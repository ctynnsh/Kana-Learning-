<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>かな — 日语假名学习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;
  --surface:#FFFFFF;
  --surface2:#F5F4F0;
  --border:#E8E6DF;
  --text:#1A1916;
  --text2:#6B6860;
  --text3:#A8A59E;
  --accent:#C8502A;
  --accent-light:#FBF0EC;
  --accent2:#2A7AC8;
  --accent2-light:#ECF3FB;
  --green:#2A8A5A;
  --green-light:#EBF6F1;
  --radius:12px;
  --radius-lg:20px;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.06);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;}
h1,h2,h3{font-family:'Noto Serif JP',serif;}
.hidden{display:none!important;}
.screen{min-height:100vh;display:flex;flex-direction:column;}

/* SPLASH */
#splash{background:var(--bg);align-items:center;justify-content:center;gap:0;}
.splash-logo{font-size:88px;line-height:1;margin-bottom:8px;font-family:'Noto Serif JP',serif;color:var(--accent);}
.splash-sub{font-size:22px;color:var(--text2);letter-spacing:0.15em;margin-bottom:48px;}
.splash-btns{display:flex;flex-direction:column;gap:12px;width:280px;}
.btn{padding:14px 24px;border-radius:var(--radius);font-size:16px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;transition:all 0.18s;font-weight:500;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#b04422;transform:translateY(-1px);}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--surface2);}

/* AUTH */
#auth{background:var(--bg);align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--surface);border-radius:var(--radius-lg);padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow);}
.auth-card h2{font-size:24px;margin-bottom:8px;}
.auth-card p{color:var(--text2);font-size:14px;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s;}
.form-group input:focus{border-color:var(--accent);}
.auth-toggle{text-align:center;margin-top:16px;font-size:14px;color:var(--text2);}
.auth-toggle span{color:var(--accent);cursor:pointer;}
.auth-error{background:#FEF2F0;color:#C0392B;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;}
.auth-guest{text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.auth-guest button{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;text-decoration:underline;}

/* SETUP */
#setup{background:var(--bg);align-items:center;justify-content:center;padding:24px;}
.setup-card{background:var(--surface);border-radius:var(--radius-lg);padding:40px 32px;width:100%;max-width:460px;box-shadow:var(--shadow);}
.setup-card h2{font-size:26px;margin-bottom:8px;}
.setup-card>p{color:var(--text2);font-size:15px;margin-bottom:32px;}
.setup-section{margin-bottom:28px;}
.setup-section h3{font-size:14px;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px;}
.toggle-group{display:flex;gap:10px;flex-wrap:wrap;}
.toggle-btn{padding:10px 20px;border-radius:100px;font-size:15px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.count-btns{display:flex;gap:8px;flex-wrap:wrap;}
.count-btn{padding:10px 18px;border-radius:100px;font-size:15px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.count-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* NAV */
.app-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:22px;font-family:'Noto Serif JP',serif;color:var(--accent);}
.nav-info{font-size:13px;color:var(--text2);}
.nav-btns{display:flex;gap:8px;}
.nav-btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.nav-btn:hover{background:var(--border);}

/* HOME */
#home{background:var(--bg);}
.home-content{padding:24px 20px;max-width:600px;margin:0 auto;width:100%;}
.greeting{font-size:24px;margin-bottom:6px;}
.greeting span{color:var(--accent);}
.home-subtitle{color:var(--text2);font-size:15px;margin-bottom:28px;}
.progress-card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;box-shadow:var(--shadow-sm);}
.progress-card h3{font-size:14px;color:var(--text2);margin-bottom:16px;letter-spacing:0.04em;}
.progress-bars{display:flex;flex-direction:column;gap:12px;}
.prog-row{display:flex;align-items:center;gap:12px;}
.prog-label{font-size:13px;color:var(--text2);width:48px;flex-shrink:0;}
.prog-bar{flex:1;height:8px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;transition:width 0.5s ease;}
.prog-fill.hira{background:var(--accent);}
.prog-fill.kata{background:var(--accent2);}
.prog-count{font-size:12px;color:var(--text3);width:48px;text-align:right;flex-shrink:0;}
.today-card{background:var(--accent);border-radius:var(--radius-lg);padding:24px;color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.18s;margin-bottom:20px;}
.today-card:hover{background:#b04422;transform:translateY(-1px);}
.today-info h3{font-size:18px;font-weight:500;margin-bottom:4px;}
.today-info p{font-size:14px;opacity:0.8;}
.today-arrow{font-size:28px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);}
.stat-card .num{font-size:32px;font-weight:500;color:var(--accent);margin-bottom:4px;}
.stat-card .lbl{font-size:13px;color:var(--text2);}
.chart-card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.chart-card h3{font-size:14px;color:var(--text2);margin-bottom:16px;}
.week-chart{display:flex;align-items:flex-end;gap:8px;height:80px;}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.week-bar{width:100%;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px;transition:height 0.5s ease;}
.week-day{font-size:11px;color:var(--text3);}
.table-card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm);}
.table-card h3{font-size:14px;color:var(--text2);margin-bottom:16px;}
.kana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.kana-cell{text-align:center;padding:8px 4px;border-radius:8px;font-size:18px;cursor:pointer;transition:all 0.15s;}
.kana-cell.known{background:var(--green-light);color:var(--green);}
.kana-cell.learning{background:var(--accent-light);color:var(--accent);}
.kana-cell.unseen{background:var(--surface2);color:var(--text3);}
.kana-cell .roma{font-size:10px;margin-top:2px;font-family:'Noto Sans JP',sans-serif;}

/* STUDY */
#study{background:var(--bg);}
.study-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.study-progress{flex:1;margin:0 16px;}
.study-prog-bar{height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.study-prog-fill{height:100%;background:var(--accent);border-radius:100px;transition:width 0.4s ease;}
.study-count{font-size:12px;color:var(--text2);margin-top:6px;text-align:center;}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.swipe-card{background:var(--surface);border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.12);transition:transform 0.08s,opacity 0.08s;cursor:grab;position:relative;touch-action:none;}
.swipe-card:active{cursor:grabbing;}
.swipe-card.swiping{transition:none;}
.swipe-hint-left{position:absolute;top:20px;left:20px;background:var(--accent);color:#fff;padding:6px 14px;border-radius:100px;font-size:13px;opacity:0;transition:opacity 0.1s;}
.swipe-hint-right{position:absolute;top:20px;right:20px;background:var(--green);color:#fff;padding:6px 14px;border-radius:100px;font-size:13px;opacity:0;transition:opacity 0.1s;}
.card-type{font-size:12px;color:var(--text3);text-align:center;margin-bottom:16px;letter-spacing:0.1em;}
.card-kana{font-size:96px;text-align:center;line-height:1.1;margin-bottom:8px;font-family:'Noto Serif JP',serif;color:var(--text);}
.card-roma{font-size:22px;text-align:center;color:var(--text2);margin-bottom:20px;letter-spacing:0.1em;}
.card-sound-btn{display:flex;align-items:center;justify-content:center;margin:0 auto 24px;width:48px;height:48px;border-radius:50%;background:var(--accent-light);color:var(--accent);border:none;font-size:22px;cursor:pointer;transition:all 0.15s;}
.card-sound-btn:hover{background:var(--accent);color:#fff;}
.card-examples{border-top:1px solid var(--border);padding-top:16px;margin-top:4px;}
.ex-item{display:flex;gap:12px;margin-bottom:10px;align-items:baseline;}
.ex-kana{font-size:20px;font-weight:500;min-width:80px;font-family:'Noto Serif JP',serif;}
.ex-roma{font-size:13px;color:var(--text2);}
.ex-meaning{font-size:13px;color:var(--text3);}
.stroke-section{margin:16px 0;text-align:center;}
.stroke-label{font-size:12px;color:var(--text3);margin-bottom:8px;}
.stroke-canvas-wrap{display:flex;justify-content:center;}
.stroke-svg{width:120px;height:120px;border:1px solid var(--border);border-radius:8px;background:var(--bg);}
.card-actions{display:flex;gap:12px;padding:16px 20px;justify-content:center;}
.action-btn{flex:1;max-width:160px;padding:14px;border-radius:var(--radius);font-size:15px;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.action-again{background:var(--accent-light);color:var(--accent);}
.action-again:hover{background:var(--accent);color:#fff;}
.action-know{background:var(--green-light);color:var(--green);}
.action-know:hover{background:var(--green);color:#fff;}
.write-section{margin:12px 0;}
.write-canvas{border:1.5px dashed var(--border);border-radius:12px;background:var(--bg);cursor:crosshair;display:block;touch-action:none;}
.write-btns{display:flex;gap:8px;justify-content:center;margin-top:8px;}
.write-btn{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Noto Sans JP',sans-serif;}
.write-btn:hover{background:var(--border);}

/* QUIZ */
#quiz{background:var(--bg);}
.quiz-content{padding:20px;max-width:520px;margin:0 auto;width:100%;}
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.quiz-prog{flex:1;height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.quiz-prog-fill{height:100%;background:var(--accent2);border-radius:100px;transition:width 0.4s;}
.quiz-num{font-size:13px;color:var(--text2);}
.quiz-question{background:var(--surface);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px;text-align:center;box-shadow:var(--shadow-sm);}
.quiz-question .q-type{font-size:12px;color:var(--text3);margin-bottom:12px;letter-spacing:0.08em;}
.quiz-question .q-kana{font-size:72px;font-family:'Noto Serif JP',serif;line-height:1.2;}
.quiz-question .q-prompt{font-size:15px;color:var(--text2);margin-top:8px;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.quiz-opt{padding:16px;border-radius:var(--radius);font-size:20px;font-family:'Noto Serif JP',serif;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s;text-align:center;}
.quiz-opt:hover{border-color:var(--accent2);background:var(--accent2-light);}
.quiz-opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green);}
.quiz-opt.wrong{background:#FEF2F0;border-color:#E74C3C;color:#E74C3C;}
.quiz-opt.show-correct{background:var(--green-light);border-color:var(--green);}
.match-area{display:flex;gap:16px;}
.match-col{flex:1;display:flex;flex-direction:column;gap:8px;}
.match-item{padding:14px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);text-align:center;cursor:pointer;transition:all 0.15s;font-size:22px;font-family:'Noto Serif JP',serif;}
.match-item:hover{border-color:var(--accent2);}
.match-item.selected{border-color:var(--accent2);background:var(--accent2-light);}
.match-item.matched{border-color:var(--green);background:var(--green-light);color:var(--green);cursor:default;}
.match-item.wrong-match{border-color:var(--accent);background:var(--accent-light);animation:shake 0.3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fill-input{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:22px;text-align:center;font-family:'Noto Serif JP',serif;outline:none;background:var(--bg);color:var(--text);}
.fill-input:focus{border-color:var(--accent2);}
.fill-input.correct{border-color:var(--green);background:var(--green-light);}
.fill-input.wrong{border-color:var(--accent);background:var(--accent-light);}
.quiz-next-btn{width:100%;margin-top:16px;padding:14px;border-radius:var(--radius);font-size:16px;cursor:pointer;border:none;background:var(--accent2);color:#fff;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all 0.18s;}
.quiz-next-btn:hover{background:#1d6aab;}
.quiz-result{text-align:center;padding:40px 20px;}
.result-emoji{font-size:64px;margin-bottom:16px;}
.result-title{font-size:28px;margin-bottom:8px;}
.result-sub{font-size:15px;color:var(--text2);margin-bottom:32px;}
.result-stats{display:flex;gap:20px;justify-content:center;margin-bottom:32px;}
.result-stat{text-align:center;}
.result-stat .n{font-size:36px;font-weight:500;color:var(--accent);}
.result-stat .l{font-size:13px;color:var(--text2);}

/* COMPLETE */
#complete{background:var(--bg);align-items:center;justify-content:center;padding:24px;}
.complete-card{background:var(--surface);border-radius:var(--radius-lg);padding:40px 32px;max-width:400px;width:100%;text-align:center;box-shadow:var(--shadow);}
.complete-emoji{font-size:64px;margin-bottom:16px;}
.complete-card h2{font-size:26px;margin-bottom:8px;}
.complete-card p{color:var(--text2);font-size:15px;margin-bottom:24px;}
.confetti-text{color:var(--accent);font-size:18px;margin-bottom:28px;}

/* Responsive */
@media(max-width:480px){
  .card-kana{font-size:80px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .quiz-options{grid-template-columns:1fr 1fr;}
  .match-area{flex-direction:column;}
}

/* Animations */
.fly-left{animation:flyLeft 0.35s ease-in forwards;}
.fly-right{animation:flyRight 0.35s ease-in forwards;}
@keyframes flyLeft{to{transform:translateX(-120%) rotate(-15deg);opacity:0;}}
@keyframes flyRight{to{transform:translateX(120%) rotate(15deg);opacity:0;}}

.fade-in{animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen">
  <div class="splash-logo">かな</div>
  <div class="splash-sub">日语假名学习</div>
  <div class="splash-btns">
    <button class="btn btn-primary" onclick="showAuth('login')">登录</button>
    <button class="btn btn-secondary" onclick="showAuth('register')">注册新账号</button>
  </div>
</div>

<!-- AUTH -->
<div id="auth" class="screen hidden">
  <div class="auth-card">
    <h2 id="auth-title">欢迎回来</h2>
    <p id="auth-desc">登录以保存你的学习进度</p>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="auth-username" placeholder="输入用户名" autocomplete="username">
    </div>
    <div class="form-group" id="auth-nickname-wrap" style="display:none">
      <label>昵称（可选）</label>
      <input type="text" id="auth-nickname" placeholder="如何称呼你？">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="auth-password" placeholder="输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doAuth()" id="auth-btn">登录</button>
    <div class="auth-toggle">
      <span id="auth-toggle-text">没有账号？</span> <span onclick="toggleAuth()"><span id="auth-toggle-link">注册</span></span>
    </div>
    <div class="auth-guest">
      <button onclick="guestLogin()">以访客身份体验（不保存进度）</button>
    </div>
  </div>
</div>

<!-- SETUP -->
<div id="setup" class="screen hidden">
  <div class="setup-card fade-in">
    <h2>设置学习计划</h2>
    <p>让我们开始学习日语假名！</p>
    <div class="setup-section">
      <h3>学习内容</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" onclick="toggleType(this,'hiragana')" data-type="hiragana">平假名</button>
        <button class="toggle-btn active" onclick="toggleType(this,'katakana')" data-type="katakana">片假名</button>
      </div>
    </div>
    <div class="setup-section">
      <h3>每天学多少个？</h3>
      <div class="count-btns">
        <button class="count-btn" onclick="setCount(this,5)">5个</button>
        <button class="count-btn active" onclick="setCount(this,10)">10个</button>
        <button class="count-btn" onclick="setCount(this,15)">15个</button>
        <button class="count-btn" onclick="setCount(this,20)">20个</button>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="startLearning()">开始学习！</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen hidden">
  <div class="app-nav">
    <div class="nav-logo">かな</div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="goToTable()">五十音表</button>
      <button class="nav-btn" onclick="logout()">退出</button>
    </div>
  </div>
  <div class="home-content fade-in">
    <div class="greeting">你好，<span id="home-name">学习者</span>！</div>
    <div class="home-subtitle" id="home-subtitle">今天继续学习日语假名吧</div>

    <div class="today-card" onclick="startStudy()">
      <div class="today-info">
        <h3 id="today-card-title">今日任务</h3>
        <p id="today-card-sub">点击开始学习</p>
      </div>
      <div class="today-arrow">→</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">已掌握假名</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-streak">0</div>
        <div class="lbl">连续学习天数</div>
      </div>
    </div>

    <div class="progress-card">
      <h3>学习进度</h3>
      <div class="progress-bars">
        <div class="prog-row">
          <div class="prog-label">平假名</div>
          <div class="prog-bar"><div class="prog-fill hira" id="prog-hira" style="width:0%"></div></div>
          <div class="prog-count" id="prog-hira-count">0/46</div>
        </div>
        <div class="prog-row">
          <div class="prog-label">片假名</div>
          <div class="prog-bar"><div class="prog-fill kata" id="prog-kata" style="width:0%"></div></div>
          <div class="prog-count" id="prog-kata-count">0/46</div>
        </div>
      </div>
    </div>

    <div class="chart-card">

// Try to find Japanese voice
function initVoice(){
  if(!synth) return;
  let voices = synth.getVoices();
  jpVoice = voices.find(v=>v.lang.startsWith('ja')) || null;
  if(!jpVoice && voices.length===0){
    synth.addEventListener('voiceschanged',()=>{
      let v2 = synth.getVoices();
      jpVoice = v2.find(v=>v.lang.startsWith('ja')) || null;
    },{once:true});
  }
}

// ===================== STORAGE =====================
function saveState(){
  if(state.isGuest) return;
  try{
    localStorage.setItem('kana_state_'+state.user, JSON.stringify({
      settings:state.settings,
      progress:state.progress,
      streak:state.streak,
      weekData:state.weekData,
      lastStudyDate:state.lastStudyDate,
      todayStudied:state.todayStudied
    }));
  }catch(e){}
}
function loadState(user){
  try{
    let d = localStorage.getItem('kana_state_'+user);
    if(d){
      let parsed = JSON.parse(d);
      state.settings = parsed.settings || state.settings;
      state.progress = parsed.progress || state.progress;
      state.streak = parsed.streak || 0;
      state.weekData = parsed.weekData || [0,0,0,0,0,0,0];
      state.lastStudyDate = parsed.lastStudyDate || null;
      state.todayStudied = parsed.todayStudied || [];
      // Reset today's studied if it's a new day
      let today = new Date().toDateString();
      if(state.lastStudyDate !== today){
        if(state.todayStudied.length>0){
          // Update streak
          let yesterday = new Date();
          yesterday.setDate(yesterday.getDate()-1);
          if(state.lastStudyDate === yesterday.toDateString()){
            state.streak++;
          } else if(state.lastStudyDate !== today){
            state.streak = 0;
          }
          // Shift week data
          state.weekData.push(state.todayStudied.length);
          state.weekData = state.weekData.slice(-7);
          state.todayStudied = [];
        }
        state.lastStudyDate = today;
        saveState();
      }
      return true;
    }
  }catch(e){}
  return false;
}

  document.getElementById('auth-desc').textContent = isReg ? '注册以保存你的学习进度' : '登录以保存你的学习进度';
  document.getElementById('auth-btn').textContent = isReg ? '注册' : '登录';
  document.getElementById('auth-toggle-text').textContent = isReg ? '已有账号？' : '没有账号？';
  document.getElementById('auth-toggle-link').textContent = isReg ? '登录' : '注册';
  document.getElementById('auth-nickname-wrap').style.display = isReg ? '' : 'none';
  document.getElementById('auth-error').style.display = 'none';
}
function toggleAuth(){
  authMode = authMode==='login'?'register':'login';
  updateAuthUI();
}
function doAuth(){
  let u = document.getElementById('auth-username').value.trim();
  let p = document.getElementById('auth-password').value;
  let err = document.getElementById('auth-error');
  if(!u){err.textContent='请输入用户名';err.style.display='';return;}
  if(!p){err.textContent='请输入密码';err.style.display='';return;}
  let users = getUsers();
  if(authMode==='register'){
    if(users[u]){err.textContent='该用户名已被使用';err.style.display='';return;}
    let nick = document.getElementById('auth-nickname').value.trim() || u;
    users[u]={password:p,nickname:nick};
    saveUsers(users);
    state.user = u;
    state.isGuest = false;
    state.settings.nickname = nick;
    saveState();
    localStorage.setItem('kana_last_user', u);
    checkSetup();
  } else {
    if(!users[u]||users[u].password!==p){err.textContent='用户名或密码错误';err.style.display='';return;}
    state.user = u;
    state.isGuest = false;
    let loaded = loadState(u);
    state.settings.nickname = users[u].nickname || u;
    localStorage.setItem('kana_last_user', u);
    if(!loaded || !state.settings.types) checkSetup();
    else showHome();
  }
}
function guestLogin(){
  state.user = 'guest';
  state.isGuest = true;
  state.settings.nickname = '学习者';
  checkSetup();
}
function logout(){
  saveState();
  localStorage.removeItem('kana_last_user');
  state = {user:null,isGuest:false,settings:{types:['hiragana','katakana'],dailyCount:10},progress:{hiragana:{},katakana:{}},todayStudied:[],streak:0,weekData:[0,0,0,0,0,0,0],lastStudyDate:null};
  show('splash');
}

// ===================== SETUP =====================
let setupTypes = ['hiragana','katakana'];
let setupCount = 10;
function checkSetup(){
  if(!state.settings || !state.settings.types || !state.settings.dailyCount){
    show('setup');
  } else {
    showHome();
  }
}
function toggleType(btn, type){
  let idx = setupTypes.indexOf(type);
  if(idx>-1){
    if(setupTypes.length===1) return;
    setupTypes.splice(idx,1);
    btn.classList.remove('active');
  } else {
    setupTypes.push(type);
    btn.classList.add('active');
  }
}
function setCount(btn, n){
  setupCount = n;
  document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function startLearning(){
  state.settings.types = setupTypes;
  state.settings.dailyCount = setupCount;
  saveState();
  showHome();
}

// ===================== HOME =====================
function showHome(){
  show('home');
  let nick = state.settings.nickname || state.user || '学习者';
  document.getElementById('home-name').textContent = nick;
  updateHomeStats();
  renderWeekChart();
  renderOverviewTable('hira');
}
function updateHomeStats(){
  let hira = HIRAGANA.filter(k=>state.progress.hiragana && state.progress.hiragana[k.r]==='known').length;
  let kata = KATAKANA.filter(k=>state.progress.katakana && state.progress.katakana[k.r]==='known').length;
  let total = hira+kata;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-streak').textContent = state.streak;
  document.getElementById('prog-hira').style.width = (hira/46*100)+'%';
  document.getElementById('prog-kata').style.width = (kata/46*100)+'%';
  document.getElementById('prog-hira-count').textContent = hira+'/46';
  document.getElementById('prog-kata-count').textContent = kata+'/46';

  // Today card
  let todayDone = state.todayStudied.length;
  let goal = state.settings.dailyCount;
  let remaining = Math.max(0, goal-todayDone);
  let sub = document.getElementById('today-card-sub');
  if(remaining===0){
    document.getElementById('today-card-title').textContent = '今日任务完成！🎉';
    sub.textContent = '点击继续复习或学新的';
  } else {
    document.getElementById('today-card-title').textContent = '今日任务';
    sub.textContent = `还剩 ${remaining} 个假名待学习`;
  }

  let hour = new Date().getHours();
  let greeting = hour<12?'早安，':'（下午好，';
  if(hour>=18) greeting='晚上好，';
  document.getElementById('home-subtitle').textContent = '今天继续学习日语假名吧！';
}
function renderWeekChart(){
  let el = document.getElementById('week-chart');
  let days = ['一','二','三','四','五','六','日'];
  let max = Math.max(...state.weekData, 1);
  let html = '';
  for(let i=0;i<7;i++){
    let h = Math.round(state.weekData[i]/max*64);
    html += `<div class="week-bar-wrap">
      <div class="week-bar" style="height:${h}px"></div>
      <div class="week-day">${days[i]}</div>
    </div>`;
  }
  el.innerHTML = html;
}
function switchTable(btn, mode){
  currentTableMode = mode;
  document.querySelectorAll('#table-toggle .toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOverviewTable(mode);
}
function renderOverviewTable(mode){
  let arr = mode==='hira'?HIRAGANA:KATAKANA;
  let pkey = mode==='hira'?'hiragana':'katakana';
  let el = document.getElementById('kana-overview');
  let html = arr.map(k=>{
    let st = state.progress[pkey]&&state.progress[pkey][k.r];
    let cls = st==='known'?'known':st?'learning':'unseen';
    return `<div class="kana-cell ${cls}" title="${k.r}">
      ${k.k}<div class="roma">${k.r}</div>
    </div>`;
  }).join('');
  el.innerHTML = html;
}
function goToTable(){
  renderOverviewTable(currentTableMode);
}

// ===================== STUDY =====================
function buildStudyQueue(){
  let types = state.settings.types;
  let all = [];
  if(types.includes('hiragana')) all.push(...HIRAGANA.map(k=>({...k,type:'hiragana',typeLabel:'平假名'})));
  if(types.includes('katakana')) all.push(...KATAKANA.map(k=>({...k,type:'katakana',typeLabel:'片假名'})));
  // Prioritize: unseen first, then learning, skip known
  let unseen = all.filter(k=>!state.progress[k.type]||!state.progress[k.type][k.r]);
  let learning = all.filter(k=>state.progress[k.type]&&state.progress[k.type][k.r]==='learning');
  let queue = [...shuffle(unseen), ...shuffle(learning)];
  let goal = state.settings.dailyCount;
  return queue.slice(0, goal);
}
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function startStudy(){
  studyQueue = buildStudyQueue();
  if(studyQueue.length===0){
    alert('所有假名都已掌握！你太棒了！');
    return;
  }
  currentCardIdx = 0;
  show('study');
  showCard(studyQueue[0]);
}
function showCard(card){
  currentCard = card;
  document.getElementById('card-type').textContent = card.typeLabel;
  document.getElementById('card-kana').textContent = card.k;
  document.getElementById('card-roma').textContent = card.r;
  updateStudyProgress();
  renderStrokeSVG(card);
  renderExamples(card);
  setupWriteCanvas();
  clearCanvas();
  initSwipe();
  // Auto play sound
  setTimeout(()=>playKanaSound(),300);
  // Reset hints
  document.getElementById('hint-left').style.opacity='0';
  document.getElementById('hint-right').style.opacity='0';
  let sc = document.getElementById('swipe-card');
  sc.style.transform='';sc.style.opacity='1';
  sc.classList.remove('fly-left','fly-right','swiping');
}
function updateStudyProgress(){
  let total = studyQueue.length;
  let pct = (currentCardIdx/total*100)+'%';
  document.getElementById('study-prog-fill').style.width=pct;
  document.getElementById('study-count').textContent=`${currentCardIdx}/${total}`;
}

// Stroke animation
function renderStrokeSVG(card){
  let svg = document.getElementById('stroke-svg');
  let strokes;
  if(card.type==='hiragana') strokes = STROKES[card.k];
  else strokes = KATAKANA_STROKES[card.k];
  if(!strokes||!strokes.length){
    svg.innerHTML=`<text x="60" y="75" text-anchor="middle" font-size="60" fill="var(--text)" font-family="Noto Serif JP,serif">${card.k}</text>`;
    return;
  }
  // Flatten: strokes can be array of arrays or array of strings
  let flat = [];
  function extractPaths(s){
    if(typeof s==='string') flat.push(s);
    else if(Array.isArray(s)) s.forEach(x=>extractPaths(x));
  }
  extractPaths(strokes);
  let colors=['#C8502A','#2A7AC8','#2A8A5A','#9B59B6'];
  let paths = flat.map((d,i)=>{
    let len = 200;
    return `<path d="M${d.trim().startsWith('M')?d.trim().slice(1):d.trim()}" stroke="${colors[i%colors.length]}" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="${len}" stroke-dashoffset="${len}">
      <animate attributeName="stroke-dashoffset" from="${len}" to="0" dur="0.6s" begin="${i*0.7}s" fill="freeze"/>
    </path>`;
  }).join('');
  svg.innerHTML=`<text x="60" y="80" text-anchor="middle" font-size="70" fill="var(--border)" font-family="Noto Serif JP,serif" opacity="0.3">${card.k}</text>${paths}`;
  // Restart animation
  svg.innerHTML = svg.innerHTML;
}

function renderExamples(card){
  let exs = EXAMPLES[card.r] || [];
  let el = document.getElementById('card-examples');
  if(!exs.length){el.innerHTML='';return;}
  let html = exs.slice(0,2).map(e=>{
    let parts = e.split('/');
    return `<div class="ex-item">
      <div class="ex-kana">${parts[0]||''}</div>
      <div><div class="ex-roma">${parts[1]||''}</div><div class="ex-meaning">${parts[2]||''}</div></div>
    </div>`;
  }).join('');
  el.innerHTML = html;
}

function playKanaSound(){
  if(!synth) return;
  if(synth.speaking) synth.cancel();
  let u = new SpeechSynthesisUtterance(currentCard.k);
  u.lang = 'ja-JP';
  if(jpVoice) u.voice = jpVoice;
  u.rate = 0.8;
  synth.speak(u);
}

// Write canvas
let isDrawing=false, lastX=0, lastY=0, ctx2d=null;
function setupWriteCanvas(){
  let canvas = document.getElementById('write-canvas');
  let wrap = canvas.parentElement;
  let w = Math.min(wrap.offsetWidth, 300);
  canvas.width = w;
  canvas.height = 160;
  canvas.style.width = w+'px';
  ctx2d = canvas.getContext('2d');
  ctx2d.lineWidth=4;ctx2d.lineCap='round';ctx2d.lineJoin='round';
  ctx2d.strokeStyle='var(--accent, #C8502A)';
  canvas.onmousedown=e=>{isDrawing=true;[lastX,lastY]=getPos(e,canvas);};
  canvas.onmousemove=e=>{if(!isDrawing)return;draw(e,canvas);};
  canvas.onmouseup=()=>isDrawing=false;
  canvas.onmouseleave=()=>isDrawing=false;
  canvas.ontouchstart=e=>{e.preventDefault();isDrawing=true;[lastX,lastY]=getPos(e.touches[0],canvas);};
  canvas.ontouchmove=e=>{e.preventDefault();if(!isDrawing)return;draw(e.touches[0],canvas);};
  canvas.ontouchend=()=>isDrawing=false;
  // Ghost kana
  renderGhostKana(canvas, ctx2d);
}
function getPos(e, canvas){
  let r = canvas.getBoundingClientRect();
  return [e.clientX-r.left, e.clientY-r.top];
}
function draw(e, canvas){
  let [x,y]=getPos(e,canvas);
  ctx2d.beginPath();ctx2d.moveTo(lastX,lastY);ctx2d.lineTo(x,y);ctx2d.stroke();
  [lastX,lastY]=[x,y];
}
function renderGhostKana(canvas, ctx){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.globalAlpha=0.08;
  ctx.font=`${Math.min(canvas.height*0.8,120)}px 'Noto Serif JP',serif`;
  ctx.fillStyle='var(--text, #1A1916)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(currentCard.k, canvas.width/2, canvas.height/2);
  ctx.restore();
  ctx.strokeStyle='#C8502A';
}
function clearCanvas(){
  if(!ctx2d||!currentCard) return;
  let canvas = document.getElementById('write-canvas');
  ctx2d.clearRect(0,0,canvas.width,canvas.height);
  renderGhostKana(canvas,ctx2d);
}

// Swipe
let startX=0, startY=0, isDragging=false, cardOffsetX=0;
function initSwipe(){
  let card = document.getElementById('swipe-card');
  card.onmousedown = e=>{if(e.target.closest('canvas')||e.target.tagName==='BUTTON')return;startX=e.clientX;isDragging=true;card.classList.add('swiping');};
  window.onmousemove = e=>{if(!isDragging)return;dragCard(e.clientX-startX);};
  window.onmouseup = e=>{if(!isDragging)return;isDragging=false;card.classList.remove('swiping');releaseDrag(e.clientX-startX);};
  card.ontouchstart = e=>{if(e.target.closest('canvas')||e.target.tagName==='BUTTON')return;startX=e.touches[0].clientX;startY=e.touches[0].clientY;isDragging=true;card.classList.add('swiping');};
  card.ontouchmove = e=>{if(!isDragging)return;let dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;if(Math.abs(dy)>Math.abs(dx)&&cardOffsetX===0){isDragging=false;card.classList.remove('swiping');return;}e.preventDefault();dragCard(dx);};
  card.ontouchend = e=>{if(!isDragging)return;isDragging=false;card.classList.remove('swiping');releaseDrag(e.changedTouches[0].clientX-startX);};
}
function dragCard(dx){
  cardOffsetX=dx;
  let card=document.getElementById('swipe-card');
  card.style.transform=`translateX(${dx}px) rotate(${dx*0.05}deg)`;
  let left=document.getElementById('hint-left');
  let right=document.getElementById('hint-right');
  if(dx<-30){left.style.opacity=Math.min(1,(-dx-30)/60)+'';right.style.opacity='0';}
  else if(dx>30){right.style.opacity=Math.min(1,(dx-30)/60)+'';left.style.opacity='0';}
  else{left.style.opacity='0';right.style.opacity='0';}
}
function releaseDrag(dx){
  cardOffsetX=0;
  if(dx<-80) swipeCard('left');
  else if(dx>80) swipeCard('right');
  else{
    let card=document.getElementById('swipe-card');
    card.classList.remove('swiping');
    card.style.transition='transform 0.3s,opacity 0.3s';
    card.style.transform='';
    setTimeout(()=>card.style.transition='',300);
    document.getElementById('hint-left').style.opacity='0';
    document.getElementById('hint-right').style.opacity='0';
  }
}
function swipeCard(dir){
  let card=document.getElementById('swipe-card');
  card.classList.add(dir==='left'?'fly-left':'fly-right');
  // Mark progress
  if(!state.progress[currentCard.type]) state.progress[currentCard.type]={};
  if(dir==='right'){
    state.progress[currentCard.type][currentCard.r]='known';
    if(!state.todayStudied.includes(currentCard.r+currentCard.type)) state.todayStudied.push(currentCard.r+currentCard.type);
  } else {
    state.progress[currentCard.type][currentCard.r]='learning';
    // Push back to end of queue
    studyQueue.push(currentCard);
  }
  saveState();
  setTimeout(()=>{
    currentCardIdx++;
    if(currentCardIdx>=studyQueue.length){
      // Done with initial pass
      let knownInSession = studyQueue.filter((k,i)=>i<studyQueue.length).length;
      startQuiz();
    } else {
      showCard(studyQueue[currentCardIdx]);
    }
  },380);
}
function goHome(){show('home');updateHomeStats();renderWeekChart();}

// ===================== QUIZ =====================
function startQuiz(){
  // Build quiz from today's studied known cards
  let types = state.settings.types;
  let all = [];
  if(types.includes('hiragana')) all.push(...HIRAGANA.map(k=>({...k,type:'hiragana',typeLabel:'平假名'})));
  if(types.includes('katakana')) all.push(...KATAKANA.map(k=>({...k,type:'katakana',typeLabel:'片假名'})));
  let known = all.filter(k=>state.progress[k.type]&&state.progress[k.type][k.r]==='known');
  if(known.length<4){showComplete();return;}
  quizItems = shuffle(known).slice(0,Math.min(8,known.length));
  quizIdx=0; quizScore=0;
  show('quiz');
  showQuizQuestion();
}
function showQuizQuestion(){
  if(quizIdx>=quizItems.length){showQuizResult();return;}
  updateQuizProgress();
  let item = quizItems[quizIdx];
  let qtype = quizIdx%3; // 0=MC kana->roma, 1=MC roma->kana, 2=fill
  let all = [...HIRAGANA,...KATAKANA];
  let pool = all.filter(k=>k.r!==item.r);
  let wrongs = shuffle(pool).slice(0,3);
  let body = document.getElementById('quiz-body');
  if(qtype===0){
    // Multiple choice: show kana, pick romaji
    let opts = shuffle([item,...wrongs]).map(o=>
      `<button class="quiz-opt" onclick="checkMC(this,'${o.r}','${item.r}')">${o.r}</button>`
    ).join('');
    body.innerHTML=`<div class="quiz-question fade-in">
      <div class="q-type">选择正确的读音</div>
      <div class="q-kana">${item.k}</div>
    </div>
    <div class="quiz-options">${opts}</div>`;
  } else if(qtype===1){
    // MC: show romaji, pick kana
    let opts = shuffle([item,...wrongs]).map(o=>
      `<button class="quiz-opt" style="font-size:32px;font-family:'Noto Serif JP',serif" onclick="checkMC(this,'${o.r}','${item.r}')">${o.k}</button>`
    ).join('');
    body.innerHTML=`<div class="quiz-question fade-in">
      <div class="q-type">选择正确的假名</div>
      <div class="q-kana" style="font-size:28px;font-family:'Noto Sans JP',sans-serif">${item.r}</div>
    </div>
    <div class="quiz-options">${opts}</div>`;
  } else {
    // Fill in the blank
    body.innerHTML=`<div class="quiz-question fade-in">
      <div class="q-type">写出这个假名的读音</div>
      <div class="q-kana">${item.k}</div>
    </div>
    <div style="padding:0 4px">
      <input class="fill-input" id="fill-input" placeholder="输入罗马字..." autocomplete="off" autocorrect="off"
        onkeydown="if(event.key==='Enter')checkFill('${item.r}')">
      <button class="quiz-next-btn" onclick="checkFill('${item.r}')" style="margin-top:12px">确认</button>
    </div>`;
    setTimeout(()=>{let f=document.getElementById('fill-input');if(f)f.focus();},100);
  }
}
function updateQuizProgress(){
  let pct=(quizIdx/quizItems.length*100)+'%';
  document.getElementById('quiz-prog-fill').style.width=pct;
  document.getElementById('quiz-num').textContent=`${quizIdx+1}/${quizItems.length}`;
}
function checkMC(btn, chosen, correct){
  document.querySelectorAll('.quiz-opt').forEach(b=>b.onclick=null);
  if(chosen===correct){
    btn.classList.add('correct');
    quizScore++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(b=>{
      if(b.textContent.trim()===correct||b.getAttribute('onclick')&&b.getAttribute('onclick').includes(`'${correct}'`)) b.classList.add('show-correct');
    });
  }
  setTimeout(()=>{quizIdx++;showQuizQuestion();},900);
}
function checkFill(correct){
  let inp = document.getElementById('fill-input');
  let val = inp.value.trim().toLowerCase();
  inp.readOnly=true;
  if(val===correct){
    inp.classList.add('correct');
    quizScore++;
  } else {
    inp.classList.add('wrong');
    inp.value = `✗ 正确答案：${correct}`;
  }
  setTimeout(()=>{quizIdx++;showQuizQuestion();},1100);
}
function showQuizResult(){
  let pct = Math.round(quizScore/quizItems.length*100);
  let emoji = pct>=80?'🌟':pct>=60?'👍':'💪';
  let msg = pct>=80?'太优秀了！':pct>=60?'继续加油！':'多多练习，你能行！';
  document.getElementById('quiz-body').innerHTML=`
    <div class="quiz-result fade-in">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${msg}</div>
      <div class="result-sub">今日测试完成</div>
      <div class="result-stats">
        <div class="result-stat"><div class="n">${quizScore}</div><div class="l">答对</div></div>
        <div class="result-stat"><div class="n">${quizItems.length-quizScore}</div><div class="l">答错</div></div>
        <div class="result-stat"><div class="n">${pct}%</div><div class="l">正确率</div></div>
      </div>
      <button class="quiz-next-btn" onclick="showComplete()">完成！</button>
    </div>`;
}
function skipQuiz(){showComplete();}
function showComplete(){
  show('complete');
  let types = state.settings.types;
  let known = 0;
  if(types.includes('hiragana')) known+=HIRAGANA.filter(k=>state.progress.hiragana&&state.progress.hiragana[k.r]==='known').length;
  if(types.includes('katakana')) known+=KATAKANA.filter(k=>state.progress.katakana&&state.progress.katakana[k.r]==='known').length;
  document.getElementById('complete-stats').textContent = `已掌握 ${known} 个假名，继续加油！`;
  // Update streak
  let today = new Date().toDateString();
  if(state.lastStudyDate!==today){
    state.lastStudyDate=today;
    state.streak++;
    state.weekData[6]=state.todayStudied.length;
  }
  saveState();
}

// ===================== UI =====================
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
document.addEventListener('DOMContentLoaded',()=>{
  // Check if logged in
  let lastUser = localStorage.getItem('kana_last_user');
  if(lastUser){
    state.user = lastUser;
    state.isGuest = false;
    let users = getUsers();
    if(users[lastUser]){
      state.settings.nickname = users[lastUser].nickname || lastUser;
      let loaded = loadState(lastUser);
      if(loaded && state.settings.types) {showHome();return;}
    }
  }
  show('splash');
});

// Save last user on auth
const _doAuth = doAuth;
// persist last user after login
function afterLogin(){
  if(!state.isGuest) localStorage.setItem('kana_last_user', state.user);
}

// Persist last user on login
if(!state.isGuest && state.user) localStorage.setItem('kana_last_user', state.user);
