<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かな — 日语假名学习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--sf:#FFF;--sf2:#F5F4F0;--bd:#E8E6DF;
  --t:#1A1916;--t2:#6B6860;--t3:#A8A59E;
  --ac:#C8502A;--acl:#FBF0EC;
  --ac2:#2A7AC8;--ac2l:#ECF3FB;
  --gr:#2A8A5A;--grl:#EBF6F1;
  --r:12px;--rl:18px;
  --sh:0 2px 16px rgba(0,0,0,.08);--ss:0 1px 4px rgba(0,0,0,.06);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t);-webkit-tap-highlight-color:transparent;user-select:none;}
h2,h3{font-family:'Noto Serif JP',serif;}
.hidden{display:none!important;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
#splash{align-items:center;justify-content:center;}
.splash-logo{font-size:76px;line-height:1;margin-bottom:4px;font-family:'Noto Serif JP',serif;color:var(--ac);}
.splash-sub{font-size:18px;color:var(--t2);letter-spacing:.15em;margin-bottom:36px;}
.splash-btns{display:flex;flex-direction:column;gap:10px;width:240px;}
.splash-input{width:100%;padding:12px 14px;border-radius:var(--r);border:1.5px solid var(--bd);font-size:16px;text-align:center;background:#fff;color:var(--t);outline:none;font-family:'Noto Sans JP',sans-serif;transition:border-color .15s;}
.splash-input:focus{border-color:var(--ac);}
.btn{padding:12px 18px;border-radius:var(--r);font-size:15px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;font-weight:500;width:100%;}
.btn-primary{background:var(--ac);color:#fff;}
.btn-secondary{background:var(--sf);color:var(--t);border:1.5px solid var(--bd);}
.name-err{color:var(--ac);font-size:12px;text-align:center;display:none;margin-top:-4px;}
#setup{align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.setup-card{background:var(--sf);border-radius:var(--rl);padding:24px 20px;width:100%;max-width:380px;box-shadow:var(--sh);}
.setup-card h2{font-size:20px;margin-bottom:4px;}
.setup-card>p{color:var(--t2);font-size:13px;margin-bottom:20px;}
.ss{margin-bottom:18px;}
.ss h3{font-size:11px;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.tog-group{display:flex;gap:7px;flex-wrap:wrap;}
.tog{padding:8px 16px;border-radius:100px;font-size:13px;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--t);font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.tog.on{background:var(--ac);border-color:var(--ac);color:#fff;}
.cnt-group{display:flex;gap:7px;flex-wrap:wrap;}
.cnt{padding:8px 14px;border-radius:100px;font-size:13px;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--t);font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.cnt.on{background:var(--ac2);border-color:var(--ac2);color:#fff;}
.anav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
.nav-logo{font-size:18px;font-family:'Noto Serif JP',serif;color:var(--ac);}
.nav-btns{display:flex;gap:5px;}
.nbtn{padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--t2);font-family:'Noto Sans JP',sans-serif;}
#home{overflow-y:auto;}
.home-scroll{padding:12px;max-width:520px;margin:0 auto;width:100%;}
.greeting{font-size:18px;margin-bottom:3px;font-family:'Noto Serif JP',serif;}
.greeting span{color:var(--ac);}
.home-sub{color:var(--t2);font-size:12px;margin-bottom:14px;}
.today-card{background:var(--ac);border-radius:var(--rl);padding:15px 18px;color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:10px;}
.today-card h3{font-size:15px;font-weight:500;margin-bottom:2px;}
.today-card p{font-size:12px;opacity:.8;}
.today-arrow{font-size:22px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{background:var(--sf);border-radius:var(--r);padding:12px;box-shadow:var(--ss);}
.stat-card .num{font-size:26px;font-weight:500;color:var(--ac);margin-bottom:1px;}
.stat-card .lbl{font-size:11px;color:var(--t2);}
.prog-card{background:var(--sf);border-radius:var(--rl);padding:14px;margin-bottom:10px;box-shadow:var(--ss);}
.prog-card h3{font-size:12px;color:var(--t2);margin-bottom:10px;}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.prog-lbl{font-size:11px;color:var(--t2);width:38px;flex-shrink:0;}
.prog-bar{flex:1;height:6px;background:var(--sf2);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;transition:width .5s;}
.prog-fill.h{background:var(--ac);}
.prog-fill.k{background:var(--ac2);}
.prog-cnt{font-size:10px;color:var(--t3);width:36px;text-align:right;flex-shrink:0;}
.chart-card{background:var(--sf);border-radius:var(--rl);padding:14px;box-shadow:var(--ss);margin-bottom:10px;}
.chart-card h3{font-size:12px;color:var(--t2);margin-bottom:10px;}
.week-chart{display:flex;align-items:flex-end;gap:5px;height:48px;}
.wbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.wb{width:100%;background:var(--ac);border-radius:2px 2px 0 0;min-height:2px;}
.wd{font-size:9px;color:var(--t3);}
.table-card{background:var(--sf);border-radius:var(--rl);padding:14px;box-shadow:var(--ss);margin-bottom:16px;}
.table-card h3{font-size:12px;color:var(--t2);margin-bottom:8px;}
.kana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;}
.kana-cell{text-align:center;padding:5px 2px;border-radius:5px;font-size:15px;}
.kana-cell.known{background:var(--grl);color:var(--gr);}
.kana-cell.learning{background:var(--acl);color:var(--ac);}
.kana-cell.unseen{background:var(--sf2);color:var(--t3);}
.kana-cell .roma{font-size:8px;margin-top:1px;}
#study{overflow:hidden;}
.study-body{flex:1;display:flex;overflow:hidden;min-height:0;flex-direction:column;padding:6px 10px;gap:6px;}
@media(min-aspect-ratio:1/1),(min-width:520px){
  .study-body{flex-direction:row;}
  .card-col{flex:1;}
  .side-col{width:120px;flex-shrink:0;flex-direction:column;}
}
.card-col{display:flex;flex-direction:column;min-width:0;position:relative;flex:none;}
@media(max-aspect-ratio:1/1) and (max-width:519px){
  .card-col{height:55dvh;min-height:200px;}
  .side-col{flex:1;flex-direction:row;}
}
.swipe-card{flex:1;background:var(--sf);border-radius:16px;box-shadow:0 3px 16px rgba(0,0,0,.10);display:flex;flex-direction:column;padding:10px 12px 8px;position:relative;overflow:hidden;touch-action:none;cursor:grab;}
.swipe-card:active{cursor:grabbing;}
.hint-badge{position:absolute;top:8px;padding:3px 10px;border-radius:100px;font-size:11px;opacity:0;transition:opacity .1s;pointer-events:none;font-weight:500;}
.hint-l{left:8px;background:var(--ac);color:#fff;}
.hint-r{right:8px;background:var(--gr);color:#fff;}
.card-type{font-size:10px;color:var(--t3);text-align:center;letter-spacing:.08em;margin-bottom:1px;}
.card-kana{font-size:clamp(52px,10vw,72px);text-align:center;line-height:1;font-family:'Noto Serif JP',serif;color:var(--t);}
.card-roma{font-size:clamp(13px,2.5vw,16px);text-align:center;color:var(--t2);letter-spacing:.1em;margin-bottom:4px;}
.card-sound-btn{display:flex;align-items:center;justify-content:center;margin:0 auto 4px;width:30px;height:30px;border-radius:50%;background:var(--acl);color:var(--ac);border:none;font-size:14px;cursor:pointer;flex-shrink:0;}
.card-examples{border-top:1px solid var(--bd);padding-top:6px;margin-top:auto;}
.ex-item{display:flex;gap:6px;margin-bottom:3px;align-items:baseline;}
.ex-kana{font-size:13px;font-weight:500;min-width:56px;font-family:'Noto Serif JP',serif;}
.ex-roma{font-size:10px;color:var(--t2);}
.ex-meaning{font-size:10px;color:var(--t3);}
.side-col{display:flex;gap:6px;flex-shrink:0;}
@media(min-aspect-ratio:1/1),(min-width:520px){
  .side-col{width:120px;flex-direction:column;}
  .stroke-panel{height:120px;}
  .write-panel{flex:1;}
}
@media(max-aspect-ratio:1/1) and (max-width:519px){
  .side-col{height:auto;flex-direction:row;}
  .stroke-panel{width:100px;flex-shrink:0;}
  .write-panel{flex:1;}
}
.stroke-panel,.write-panel{background:var(--sf);border-radius:12px;box-shadow:var(--ss);padding:6px;display:flex;flex-direction:column;align-items:center;}
.panel-lbl{font-size:9px;color:var(--t3);margin-bottom:3px;letter-spacing:.04em;flex-shrink:0;}
/* SVG stroke display */
.stroke-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
.stroke-svg-wrap svg{width:100%;height:100%;}
.write-panel{align-items:stretch;}
#write-canvas{border:1.5px dashed var(--bd);border-radius:7px;background:var(--bg);cursor:crosshair;display:block;touch-action:none;flex:1;}
.clear-btn{margin-top:3px;padding:2px 10px;border-radius:5px;font-size:10px;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--t2);font-family:'Noto Sans JP',sans-serif;flex-shrink:0;align-self:center;}
.card-actions{display:flex;gap:8px;padding:6px 10px;flex-shrink:0;}
.act-btn{flex:1;padding:11px;border-radius:var(--r);font-size:14px;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px;}
.act-again{background:var(--acl);color:var(--ac);}
.act-know{background:var(--grl);color:var(--gr);}
#quiz{overflow-y:auto;}
.quiz-wrap{padding:14px;max-width:440px;margin:0 auto;width:100%;}
.quiz-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.quiz-pb{flex:1;height:3px;background:var(--sf2);border-radius:100px;overflow:hidden;}
.quiz-pf{height:100%;background:var(--ac2);border-radius:100px;transition:width .4s;}
.quiz-num{font-size:11px;color:var(--t2);}
.quiz-q{background:var(--sf);border-radius:var(--rl);padding:20px;margin-bottom:14px;text-align:center;box-shadow:var(--ss);}
.q-type{font-size:10px;color:var(--t3);margin-bottom:8px;letter-spacing:.08em;}
.q-kana{font-size:60px;font-family:'Noto Serif JP',serif;line-height:1.2;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.quiz-opt{padding:13px;border-radius:var(--r);font-size:18px;font-family:'Noto Serif JP',serif;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--t);transition:all .15s;text-align:center;}
.quiz-opt.correct{background:var(--grl);border-color:var(--gr);color:var(--gr);}
.quiz-opt.wrong{background:#FEF2F0;border-color:#E74C3C;color:#E74C3C;}
.quiz-opt.show-ok{background:var(--grl);border-color:var(--gr);}
.fill-inp{width:100%;padding:11px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:20px;text-align:center;font-family:'Noto Serif JP',serif;outline:none;background:var(--bg);color:var(--t);}
.fill-inp:focus{border-color:var(--ac2);}
.fill-inp.correct{border-color:var(--gr);background:var(--grl);}
.fill-inp.wrong{border-color:var(--ac);background:var(--acl);}
.quiz-next{width:100%;margin-top:10px;padding:12px;border-radius:var(--r);font-size:14px;cursor:pointer;border:none;background:var(--ac2);color:#fff;font-family:'Noto Sans JP',sans-serif;font-weight:500;}
.res-box{text-align:center;padding:28px 16px;}
.res-em{font-size:52px;margin-bottom:10px;}
.res-title{font-size:22px;margin-bottom:5px;}
.res-sub{font-size:13px;color:var(--t2);margin-bottom:20px;}
.res-stats{display:flex;gap:14px;justify-content:center;margin-bottom:20px;}
.res-stat .n{font-size:28px;font-weight:500;color:var(--ac);}
.res-stat .l{font-size:11px;color:var(--t2);}
#complete{align-items:center;justify-content:center;padding:16px;}
.comp-card{background:var(--sf);border-radius:var(--rl);padding:28px 22px;max-width:320px;width:100%;text-align:center;box-shadow:var(--sh);}
.comp-em{font-size:52px;margin-bottom:10px;}
.comp-card h2{font-size:20px;margin-bottom:5px;}
.comp-card p{color:var(--t2);font-size:13px;margin-bottom:5px;}
.comp-acc{color:var(--ac);font-size:16px;margin-bottom:20px;font-weight:500;}
.fade-in{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.fly-l{animation:flyL .3s ease-in forwards;}
.fly-r{animation:flyR .3s ease-in forwards;}
@keyframes flyL{to{transform:translateX(-130%) rotate(-12deg);opacity:0;}}
@keyframes flyR{to{transform:translateX(130%) rotate(12deg);opacity:0;}}
/* stroke path animation via dashoffset */
.ksvg-path{fill:none;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>

<div id="splash" class="screen">
  <div class="splash-logo">かな</div>
  <div class="splash-sub">日语假名学习</div>
  <div class="splash-btns">
    <input id="name-input" class="splash-input" type="text" placeholder="你叫什么名字？" autocomplete="name" maxlength="16" onkeydown="if(event.key==='Enter')enterByName()">
    <button class="btn btn-primary" onclick="enterByName()">开始学习 →</button>
    <div class="name-err" id="name-err">请输入你的名字</div>
  </div>
</div>

<div id="setup" class="screen hidden">
  <div class="setup-card fade-in">
    <h2 id="setup-title">你好！</h2>
    <p>设置一下你的学习计划</p>
    <div class="ss">
      <h3>学习内容</h3>
      <div class="tog-group">
        <button class="tog on" onclick="togType(this,'hiragana')">平假名 あ</button>
        <button class="tog on" onclick="togType(this,'katakana')">片假名 ア</button>
      </div>
    </div>
    <div class="ss">
      <h3>每天学多少个？</h3>
      <div class="cnt-group">
        <button class="cnt" onclick="setN(this,5)">5个</button>
        <button class="cnt on" onclick="setN(this,10)">10个</button>
        <button class="cnt" onclick="setN(this,15)">15个</button>
        <button class="cnt" onclick="setN(this,20)">20个</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveSetup()">出发！</button>
  </div>
</div>

<div id="home" class="screen hidden">
  <div class="anav">
    <div class="nav-logo">かな</div>
    <div class="nav-btns">
      <button class="nbtn" onclick="togTable()">五十音表</button>
      <button class="nbtn" onclick="resetUser()">换人</button>
    </div>
  </div>
  <div class="home-scroll fade-in">
    <div class="greeting">你好，<span id="home-name"></span>！</div>
    <div class="home-sub">今天继续学习日语假名吧</div>
    <div class="today-card" onclick="startStudy()">
      <div><h3 id="today-title">今日任务</h3><p id="today-sub">点击开始</p></div>
      <div class="today-arrow">→</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="lbl">已掌握假名</div></div>
      <div class="stat-card"><div class="num" id="stat-streak">0</div><div class="lbl">连续学习天数</div></div>
    </div>
    <div class="prog-card">
      <h3>学习进度</h3>
      <div class="prog-row"><div class="prog-lbl">平假名</div><div class="prog-bar"><div class="prog-fill h" id="prog-h" style="width:0%"></div></div><div class="prog-cnt" id="prog-hc">0/46</div></div>
      <div class="prog-row"><div class="prog-lbl">片假名</div><div class="prog-bar"><div class="prog-fill k" id="prog-k" style="width:0%"></div></div><div class="prog-cnt" id="prog-kc">0/46</div></div>
    </div>
    <div class="chart-card">
      <h3>本周学习</h3>
      <div class="week-chart" id="week-chart"></div>
    </div>
    <div class="table-card">
      <h3>五十音总览</h3>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button class="tog on" id="ttab-h" style="font-size:11px;padding:4px 10px;" onclick="switchTab('hira')">平假名</button>
        <button class="tog" id="ttab-k" style="font-size:11px;padding:4px 10px;" onclick="switchTab('kata')">片假名</button>
      </div>
      <div class="kana-grid" id="kana-ov"></div>
    </div>
  </div>
</div>

<div id="study" class="screen hidden">
  <div class="anav">
    <div class="nav-logo">かな</div>
    <div style="flex:1;padding:0 10px;">
      <div style="height:3px;background:var(--sf2);border-radius:100px;overflow:hidden;">
        <div style="height:100%;background:var(--ac);border-radius:100px;transition:width .4s;" id="spf"></div>
      </div>
      <div style="font-size:10px;color:var(--t2);text-align:center;margin-top:3px;" id="scount"></div>
    </div>
    <button class="nbtn" onclick="goHome()">主页</button>
  </div>
  <div class="study-body">
    <div class="card-col">
      <div class="swipe-card" id="swipe-card">
        <div class="hint-badge hint-l" id="hint-l">再学一遍</div>
        <div class="hint-badge hint-r" id="hint-r">已掌握 ✓</div>
        <div class="card-type" id="card-type"></div>
        <div class="card-kana" id="card-kana"></div>
        <div class="card-roma" id="card-roma"></div>
        <button class="card-sound-btn" onclick="playSound()">🔊</button>
        <div class="card-examples" id="card-exs"></div>
      </div>
    </div>
    <div class="side-col">
      <div class="stroke-panel" id="stroke-panel">
        <div class="panel-lbl">笔顺</div>
        <div class="stroke-svg-wrap" id="stroke-svg-wrap"></div>
      </div>
      <div class="write-panel">
        <div class="panel-lbl">描红</div>
        <canvas id="write-canvas"></canvas>
        <button class="clear-btn" onclick="clearWrite()">清除</button>
      </div>
    </div>
  </div>
  <div class="card-actions">
    <button class="act-btn act-again" onclick="swipe('left')">← 再学一遍</button>
    <button class="act-btn act-know" onclick="swipe('right')">已掌握 →</button>
  </div>
</div>

<div id="quiz" class="screen hidden">
  <div class="anav">
    <div class="nav-logo">かな</div>
    <div style="font-size:12px;color:var(--t2);">学习检验</div>
    <button class="nbtn" onclick="showComplete()">跳过</button>
  </div>
  <div class="quiz-wrap fade-in">
    <div class="quiz-hdr">
      <div class="quiz-pb"><div class="quiz-pf" id="qpf"></div></div>
      <div class="quiz-num" id="qnum"></div>
    </div>
    <div id="qbody"></div>
  </div>
</div>

<div id="complete" class="screen hidden">
  <div class="comp-card fade-in">
    <div class="comp-em">🎉</div>
    <h2>今日任务完成！</h2>
    <p id="comp-msg">坚持每天学习，你最棒！</p>
    <div class="comp-acc" id="comp-stats"></div>
    <button class="btn btn-primary" style="margin-bottom:8px" onclick="goHome()">回到主页</button>
    <button class="btn btn-secondary" onclick="startStudy()">继续学更多</button>
  </div>
</div>

<script>
var HIRAGANA=[
  {k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'},
  {k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'},
  {k:'さ',r:'sa'},{k:'し',r:'shi'},{k:'す',r:'su'},{k:'せ',r:'se'},{k:'そ',r:'so'},
  {k:'た',r:'ta'},{k:'ち',r:'chi'},{k:'つ',r:'tsu'},{k:'て',r:'te'},{k:'と',r:'to'},
  {k:'な',r:'na'},{k:'に',r:'ni'},{k:'ぬ',r:'nu'},{k:'ね',r:'ne'},{k:'の',r:'no'},
  {k:'は',r:'ha'},{k:'ひ',r:'hi'},{k:'ふ',r:'fu'},{k:'へ',r:'he'},{k:'ほ',r:'ho'},

var STROKE_COLORS=['#C8502A','#2A7AC8','#2A8A5A','#9B59B6','#E67E22'];
var PER_MS=700, PAUSE_MS=250, LOOP_GAP=1000;
var animId=null, animKana='', animPaths=[], animStart=0;

// Compute path length via sampling
function pathLen(el){
  try{return el.getTotalLength();}catch(e){return 200;}
}

function buildStrokeSVG(kana){
  var paths=KVG[kana]||[];
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 109 109');
  svg.setAttribute('xmlns',ns);
  svg.style.cssText='width:100%;height:100%;overflow:visible;';

  // ghost character
  var txt=document.createElementNS(ns,'text');
  txt.setAttribute('x','54.5');txt.setAttribute('y','88');
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('font-size','88');
  txt.setAttribute('font-family','Noto Serif JP,serif');
  txt.setAttribute('fill','rgba(0,0,0,0.06)');
  txt.textContent=kana;
  svg.appendChild(txt);

  // path elements (hidden initially, revealed by animation)
  paths.forEach(function(d,i){
    var p=document.createElementNS(ns,'path');
    p.setAttribute('d',d);
    p.setAttribute('fill','none');
    p.setAttribute('stroke',STROKE_COLORS[i%STROKE_COLORS.length]);
    p.setAttribute('stroke-width','4');
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-linejoin','round');
    p.setAttribute('class','ksvg-path');
    p.dataset.idx=i;
    svg.appendChild(p);

    // stroke number at start point
    // parse first coord from path d
    var m=d.match(/M\s*([\d.]+),([\d.]+)/);
    if(m){
      var lbl=document.createElementNS(ns,'text');
      lbl.setAttribute('x',m[1]);lbl.setAttribute('y',m[2]);
      lbl.setAttribute('font-size','7');lbl.setAttribute('font-family','sans-serif');
      lbl.setAttribute('fill',STROKE_COLORS[i%STROKE_COLORS.length]);
      lbl.setAttribute('text-anchor','middle');lbl.setAttribute('dominant-baseline','middle');
      lbl.setAttribute('font-weight','bold');
      lbl.textContent=i+1;
      lbl.dataset.strokeNum=i;
      svg.appendChild(lbl);
    }
  });
  return svg;
}

function startStrokeAnim(kana){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  var wrap=document.getElementById('stroke-svg-wrap');
  wrap.innerHTML='';
  var svg=buildStrokeSVG(kana);
  wrap.appendChild(svg);
  animKana=kana;
  // Collect path elements and their lengths
  animPaths=[];
  var ps=svg.querySelectorAll('.ksvg-path');
  ps.forEach(function(p){
    var len=pathLen(p);
    p.style.strokeDasharray=len;
    p.style.strokeDashoffset=len; // hidden
    animPaths.push({el:p,len:len});
  });
  // hide number labels initially
  svg.querySelectorAll('text[data-stroke-num]').forEach(function(t){
    t.style.opacity='0';
  });
  animStart=performance.now();
  animFrame(animStart);
}

function animFrame(now){
  if(!animPaths.length)return;
  var elapsed=(now-animStart);
  var totalCycle=animPaths.length*(PER_MS+PAUSE_MS)+LOOP_GAP;
  var t=elapsed%totalCycle;

  var svg=document.getElementById('stroke-svg-wrap').querySelector('svg');
  if(!svg)return;
  var numLabels=svg.querySelectorAll('text[data-stroke-num]');

  animPaths.forEach(function(ap,i){
    var ss=i*(PER_MS+PAUSE_MS);
    var se=ss+PER_MS;
    if(t<ss){
      // not started yet
      ap.el.style.strokeDashoffset=ap.len;
      if(numLabels[i])numLabels[i].style.opacity='0';
    } else if(t<se){
      // drawing
      var prog=(t-ss)/PER_MS;
      ap.el.style.strokeDashoffset=ap.len*(1-prog);
      if(numLabels[i])numLabels[i].style.opacity='1';
    } else {
      // done
      ap.el.style.strokeDashoffset=0;
      if(numLabels[i])numLabels[i].style.opacity='1';
    }
  });
  animId=requestAnimationFrame(animFrame);
}

var STORE='kana_v4_';
function save(){try{localStorage.setItem(STORE+state.name,JSON.stringify(state));}catch(e){}}
function load(n){try{var d=localStorage.getItem(STORE+n);if(d){state=JSON.parse(d);return true;}}catch(e){}return false;}

function enterByName(){
  var n=document.getElementById('name-input').value.trim();
  if(!n){document.getElementById('name-err').style.display='block';return;}
  document.getElementById('name-err').style.display='none';
  state.name=n;
  if(!load(n)){
    state={name:n,settings:{types:['hiragana','katakana'],dailyCount:10},progress:{hiragana:{},katakana:{}},todayStudied:[],streak:0,weekData:[0,0,0,0,0,0,0],lastStudyDate:null};
    sTypes=['hiragana','katakana'];sCount=10;
    document.getElementById('setup-title').textContent='你好，'+n+'！';
    show('setup');
  } else {checkDay();showHome();}
  localStorage.setItem('kana_last',n);
}
function checkDay(){
  var today=new Date().toDateString();
  if(state.lastStudyDate&&state.lastStudyDate!==today){
    var diff=Math.round((new Date(today)-new Date(state.lastStudyDate))/86400000);
    if(diff===1)state.streak++;else if(diff>1)state.streak=0;
    state.weekData.push(state.todayStudied.length);
    if(state.weekData.length>7)state.weekData=state.weekData.slice(-7);
    state.todayStudied=[];state.lastStudyDate=today;save();
  }else if(!state.lastStudyDate)state.lastStudyDate=new Date().toDateString();
}
function togType(btn,type){
  var i=sTypes.indexOf(type);
  if(i>-1){if(sTypes.length===1)return;sTypes.splice(i,1);btn.classList.remove('on');}
  else{sTypes.push(type);btn.classList.add('on');}
}
function setN(btn,n){sCount=n;document.querySelectorAll('.cnt').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');}
function saveSetup(){state.settings={types:sTypes.slice(),dailyCount:sCount};state.lastStudyDate=new Date().toDateString();save();showHome();}
function showHome(){
  show('home');
  document.getElementById('home-name').textContent=state.name;
  var h=HIRAGANA.filter(function(k){return state.progress.hiragana&&state.progress.hiragana[k.r]==='known';}).length;
  var k=KATAKANA.filter(function(k){return state.progress.katakana&&state.progress.katakana[k.r]==='known';}).length;
  document.getElementById('stat-total').textContent=h+k;
  document.getElementById('stat-streak').textContent=state.streak;
  document.getElementById('prog-h').style.width=Math.round(h/46*100)+'%';
  document.getElementById('prog-k').style.width=Math.round(k/46*100)+'%';
  document.getElementById('prog-hc').textContent=h+'/46';
  document.getElementById('prog-kc').textContent=k+'/46';
  var rem=Math.max(0,state.settings.dailyCount-state.todayStudied.length);
  document.getElementById('today-title').textContent=rem===0?'今日任务完成 🎉':'今日任务';
  document.getElementById('today-sub').textContent=rem===0?'点击继续复习':'还剩 '+rem+' 个假名';
  renderWeek();renderOvTable(tabMode);
}
function renderWeek(){
  var days=['一','二','三','四','五','六','日'];
  var max=Math.max.apply(null,state.weekData.concat([1]));
  document.getElementById('week-chart').innerHTML=state.weekData.map(function(v,i){
    var h=Math.round(v/max*40);
    return '<div class="wbw"><div class="wb" style="height:'+h+'px"></div><div class="wd">'+days[i]+'</div></div>';
  }).join('');
}
function togTable(){switchTab(tabMode==='hira'?'kata':'hira');}
function switchTab(m){
  tabMode=m;
  document.getElementById('ttab-h').classList.toggle('on',m==='hira');
  document.getElementById('ttab-k').classList.toggle('on',m==='kata');
  renderOvTable(m);
}
function renderOvTable(m){
  var arr=m==='hira'?HIRAGANA:KATAKANA,pk=m==='hira'?'hiragana':'katakana';
  document.getElementById('kana-ov').innerHTML=arr.map(function(k){
    var st=state.progress[pk]&&state.progress[pk][k.r];
    var cls=st==='known'?'known':st?'learning':'unseen';
    return '<div class="kana-cell '+cls+'">'+k.k+'<div class="roma">'+k.r+'</div></div>';
  }).join('');
}
function goHome(){if(animId){cancelAnimationFrame(animId);animId=null;}show('home');showHome();}
function resetUser(){localStorage.removeItem('kana_last');state={name:'',settings:{types:['hiragana','katakana'],dailyCount:10},progress:{hiragana:{},katakana:{}},todayStudied:[],streak:0,weekData:[0,0,0,0,0,0,0],lastStudyDate:null};document.getElementById('name-input').value='';show('splash');}

// ═══════════ WRITE CANVAS ═══════════
function setupWrite(){
  var c=document.getElementById('write-canvas');
  var panel=c.parentElement;
  var pw=panel.clientWidth-12;
  var ph=panel.clientHeight-30;
  c.width=Math.max(40,pw);c.height=Math.max(40,ph);
  c.style.width=c.width+'px';c.style.height=c.height+'px';
  wCtx=c.getContext('2d');
  wCtx.lineWidth=3.5;wCtx.lineCap='round';wCtx.lineJoin='round';wCtx.strokeStyle='#C8502A';
  c.onmousedown=function(e){wDrawing=true;var p=wPos(e,c);wLastX=p[0];wLastY=p[1];};
  c.ontouchstart=function(e){e.preventDefault();wDrawing=true;var p=wPos(e.touches[0],c);wLastX=p[0];wLastY=p[1];};
  c.ontouchmove=function(e){e.preventDefault();if(!wDrawing)return;wDraw(e.touches[0],c);};
  c.ontouchend=function(){wDrawing=false;};
}
function wMouseMove(e){if(!wDrawing)return;var c=document.getElementById('write-canvas');if(wCtx)wDraw(e,c);}
function wDraw(e,c){var p=wPos(e,c);wCtx.beginPath();wCtx.moveTo(wLastX,wLastY);wCtx.lineTo(p[0],p[1]);wCtx.stroke();wLastX=p[0];wLastY=p[1];}
function wPos(e,c){var r=c.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top];}
function clearWrite(){
  if(!wCtx||!curCard)return;
  var c=document.getElementById('write-canvas');
  wCtx.clearRect(0,0,c.width,c.height);
  wCtx.save();wCtx.globalAlpha=0.07;
  wCtx.font=Math.min(c.height*.8,c.width*.8)+'px "Noto Serif JP",serif';
  wCtx.fillStyle='#1A1916';wCtx.textAlign='center';wCtx.textBaseline='middle';
  wCtx.fillText(curCard.k,c.width/2,c.height/2);
  wCtx.restore();wCtx.strokeStyle='#C8502A';
}
window.addEventListener('mousemove',wMouseMove,{passive:true});
window.addEventListener('mouseup',function(){wDrawing=false;});

// ═══════════ STUDY ═══════════
function shuffle(a){return a.slice().sort(function(){return Math.random()-.5;});}
function buildQ(){
  var t=state.settings.types,all=[];
  if(t.indexOf('hiragana')>-1)all=all.concat(HIRAGANA.map(function(k){return Object.assign({},k,{type:'hiragana',tl:'平假名'});}));
  if(t.indexOf('katakana')>-1)all=all.concat(KATAKANA.map(function(k){return Object.assign({},k,{type:'katakana',tl:'片假名'});}));
  var unseen=all.filter(function(k){return !state.progress[k.type]||!state.progress[k.type][k.r];});
  var learning=all.filter(function(k){return state.progress[k.type]&&state.progress[k.type][k.r]==='learning';});
  return shuffle(unseen).concat(shuffle(learning)).slice(0,state.settings.dailyCount);
}
function startStudy(){
  queue=buildQ();
  if(!queue.length){alert('所有假名已掌握！你太棒了！');return;}
  qIdx=0;show('study');
  setTimeout(function(){setupWrite();showCard(queue[0]);},60);
}
function showCard(card){
  curCard=card;
  document.getElementById('card-type').textContent=card.tl;
  document.getElementById('card-kana').textContent=card.k;
  document.getElementById('card-roma').textContent=card.r;
  document.getElementById('hint-l').style.opacity='0';
  document.getElementById('hint-r').style.opacity='0';
  var sc=document.getElementById('swipe-card');
  sc.style.transform='';sc.style.opacity='1';sc.classList.remove('fly-l','fly-r');
  updateProg();renderExs(card);clearWrite();
  startStrokeAnim(card.k);
  initSwipe();
  setTimeout(playSound,300);
}
function updateProg(){
  var pct=queue.length?Math.round(qIdx/queue.length*100):0;
  document.getElementById('spf').style.width=pct+'%';
  document.getElementById('scount').textContent=qIdx+'/'+queue.length;
}
function renderExs(card){
  var exs=EXAMPLES[card.r]||[];
  var el=document.getElementById('card-exs');
  if(!exs.length){el.innerHTML='';return;}
  el.innerHTML=exs.slice(0,2).map(function(e){
    var p=e.split('/');
    return '<div class="ex-item"><div class="ex-kana">'+(p[0]||'')+'</div><div><div class="ex-roma">'+(p[1]||'')+'</div><div class="ex-meaning">'+(p[2]||'')+'</div></div></div>';
  }).join('');
}
function playSound(){
  if(!synth||!curCard)return;
  if(synth.speaking)synth.cancel();
  var u=new SpeechSynthesisUtterance(curCard.k);
  u.lang='ja-JP';u.rate=0.8;if(jpVoice)u.voice=jpVoice;synth.speak(u);
}
function initSwipe(){
  var card=document.getElementById('swipe-card');
  card.onmousedown=function(e){if(e.target.closest('canvas')||e.target.tagName==='BUTTON')return;sDragX=e.clientX;sDragging=true;card.style.transition='none';};
  document.onmousemove=function(e){if(!sDragging)return;sDragMove(e.clientX-sDragX);};
  document.onmouseup=function(e){if(!sDragging)return;sDragging=false;card.style.transition='';sDragEnd(e.clientX-sDragX);};
  card.ontouchstart=function(e){if(e.target.closest('canvas')||e.target.tagName==='BUTTON')return;sDragX=e.touches[0].clientX;sDragging=true;card.style.transition='none';};
  card.ontouchmove=function(e){if(!sDragging)return;e.preventDefault();sDragMove(e.touches[0].clientX-sDragX);};
  card.ontouchend=function(e){if(!sDragging)return;sDragging=false;card.style.transition='';sDragEnd(e.changedTouches[0].clientX-sDragX);};
}
function sDragMove(dx){
  document.getElementById('swipe-card').style.transform='translateX('+dx+'px) rotate('+(dx*.025)+'deg)';
  document.getElementById('hint-l').style.opacity=dx<-20?Math.min(1,(-dx-20)/50):'0';
  document.getElementById('hint-r').style.opacity=dx>20?Math.min(1,(dx-20)/50):'0';
}
function sDragEnd(dx){
  if(dx<-65)swipe('left');
  else if(dx>65)swipe('right');
  else{
    var c=document.getElementById('swipe-card');
    c.style.transition='transform .22s';c.style.transform='';
    document.getElementById('hint-l').style.opacity='0';
    document.getElementById('hint-r').style.opacity='0';
    setTimeout(function(){c.style.transition='';},230);
  }
}
function swipe(dir){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  document.getElementById('swipe-card').classList.add(dir==='left'?'fly-l':'fly-r');
  if(!state.progress[curCard.type])state.progress[curCard.type]={};
  var key=curCard.r+'_'+curCard.type;
  if(dir==='right'){
    state.progress[curCard.type][curCard.r]='known';
    if(state.todayStudied.indexOf(key)<0)state.todayStudied.push(key);
  } else {
    state.progress[curCard.type][curCard.r]='learning';
    queue.push(curCard);
  }
  if(!state.lastStudyDate)state.lastStudyDate=new Date().toDateString();
  save();
  setTimeout(function(){
    qIdx++;
    if(qIdx>=queue.length)startQuiz();
    else showCard(queue[qIdx]);
  },320);
}

// ═══════════ QUIZ ═══════════
function startQuiz(){
  var t=state.settings.types,all=[];
  if(t.indexOf('hiragana')>-1)all=all.concat(HIRAGANA.map(function(k){return Object.assign({},k,{type:'hiragana'});}));
  if(t.indexOf('katakana')>-1)all=all.concat(KATAKANA.map(function(k){return Object.assign({},k,{type:'katakana'});}));
  var known=all.filter(function(k){return state.progress[k.type]&&state.progress[k.type][k.r]==='known';});
  if(known.length<4){showComplete();return;}
  qzItems=shuffle(known).slice(0,Math.min(8,known.length));
  qzIdx=0;qzScore=0;show('quiz');showQ();
}
function showQ(){
  if(qzIdx>=qzItems.length){showQResult();return;}
  var pct=Math.round(qzIdx/qzItems.length*100);
  document.getElementById('qpf').style.width=pct+'%';
  document.getElementById('qnum').textContent=(qzIdx+1)+'/'+qzItems.length;
  var item=qzItems[qzIdx];
  var pool=shuffle(HIRAGANA.concat(KATAKANA).filter(function(k){return k.r!==item.r;})).slice(0,3);
  var qt=qzIdx%3,body=document.getElementById('qbody');
  if(qt===0){
    var opts=shuffle([item].concat(pool)).map(function(o){return '<button class="quiz-opt" onclick="checkMC(this,\''+o.r+'\',\''+item.r+'\')">'+o.r+'</button>';}).join('');
    body.innerHTML='<div class="quiz-q fade-in"><div class="q-type">这个假名怎么读？</div><div class="q-kana">'+item.k+'</div></div><div class="quiz-opts">'+opts+'</div>';
  } else if(qt===1){
    var opts2=shuffle([item].concat(pool)).map(function(o){return '<button class="quiz-opt" style="font-size:28px" onclick="checkMC(this,\''+o.r+'\',\''+item.r+'\')">'+o.k+'</button>';}).join('');
    body.innerHTML='<div class="quiz-q fade-in"><div class="q-type">哪个是「'+item.r+'」？</div><div class="q-kana" style="font-size:28px;font-family:sans-serif">'+item.r+'</div></div><div class="quiz-opts">'+opts2+'</div>';
  } else {
    body.innerHTML='<div class="quiz-q fade-in"><div class="q-type">写出这个假名的读音</div><div class="q-kana">'+item.k+'</div></div><div style="padding:0 2px"><input class="fill-inp" id="fill-inp" placeholder="输入罗马字…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key===\'Enter\')checkFill(\''+item.r+'\')"><button class="quiz-next" onclick="checkFill(\''+item.r+'\')">确认</button></div>';
    setTimeout(function(){var f=document.getElementById('fill-inp');if(f)f.focus();},80);
  }
}
function checkMC(btn,chosen,correct){
  document.querySelectorAll('.quiz-opt').forEach(function(b){b.onclick=null;});
  if(chosen===correct){btn.classList.add('correct');qzScore++;}
  else{btn.classList.add('wrong');document.querySelectorAll('.quiz-opt').forEach(function(b){if(b.textContent.trim()===correct)b.classList.add('show-ok');});}
  setTimeout(function(){qzIdx++;showQ();},880);
}
function checkFill(correct){
  var inp=document.getElementById('fill-inp');inp.readOnly=true;
  if(inp.value.trim().toLowerCase()===correct){inp.classList.add('correct');qzScore++;}
  else{inp.classList.add('wrong');inp.value='✗ 正确：'+correct;}
  setTimeout(function(){qzIdx++;showQ();},1050);
}
function showQResult(){
  var pct=Math.round(qzScore/qzItems.length*100);
  var em=pct>=80?'🌟':pct>=60?'👍':'💪',msg=pct>=80?'太棒了！':pct>=60?'继续加油！':'多练习，你能行！';
  document.getElementById('qbody').innerHTML='<div class="res-box fade-in"><div class="res-em">'+em+'</div><div class="res-title">'+msg+'</div><div class="res-sub">今日测验完成</div><div class="res-stats"><div class="res-stat"><div class="n">'+qzScore+'</div><div class="l">答对</div></div><div class="res-stat"><div class="n">'+(qzItems.length-qzScore)+'</div><div class="l">答错</div></div><div class="res-stat"><div class="n">'+pct+'%</div><div class="l">正确率</div></div></div><button class="quiz-next" onclick="showComplete()">完成！</button></div>';
}
function showComplete(){
  show('complete');
  var t=state.settings.types,k=0;
  if(t.indexOf('hiragana')>-1)k+=HIRAGANA.filter(function(x){return state.progress.hiragana&&state.progress.hiragana[x.r]==='known';}).length;
  if(t.indexOf('katakana')>-1)k+=KATAKANA.filter(function(x){return state.progress.katakana&&state.progress.katakana[x.r]==='known';}).length;
  document.getElementById('comp-msg').textContent=state.name+'，你今天表现得很棒！';
  document.getElementById('comp-stats').textContent='已掌握 '+k+' 个假名，继续加油！';
  var today=new Date().toDateString();
  if(state.lastStudyDate!==today){state.lastStudyDate=today;state.streak++;}
  state.weekData[state.weekData.length-1]=state.todayStudied.length;
  save();
}
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.add('hidden');});document.getElementById(id).classList.remove('hidden');}
window.onload=function(){
  var last=localStorage.getItem('kana_last');
  if(last&&load(last)&&state.name){document.getElementById('name-input').value=state.name;checkDay();showHome();return;}
  show('splash');
  setTimeout(function(){document.getElementById('name-input').focus();},200);
};
</script>
