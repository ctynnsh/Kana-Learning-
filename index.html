<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>かな — 日语假名学习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--surface2:#F5F4F0;--border:#E8E6DF;
  --text:#1A1916;--text2:#6B6860;--text3:#A8A59E;
  --accent:#C8502A;--accent-light:#FBF0EC;
  --accent2:#2A7AC8;--accent2-light:#ECF3FB;
  --green:#2A8A5A;--green-light:#EBF6F1;
  --radius:12px;--radius-lg:20px;
  --shadow:0 2px 16px rgba(0,0,0,0.08);--shadow-sm:0 1px 4px rgba(0,0,0,0.06);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;}
h1,h2,h3{font-family:'Noto Serif JP',serif;}
.hidden{display:none!important;}
.screen{min-height:100vh;display:flex;flex-direction:column;}

/* SPLASH */
#splash{background:var(--bg);align-items:center;justify-content:center;gap:0;}
.splash-logo{font-size:88px;line-height:1;margin-bottom:8px;font-family:'Noto Serif JP',serif;color:var(--accent);}
.splash-sub{font-size:22px;color:var(--text2);letter-spacing:0.15em;margin-bottom:48px;}
.splash-btns{display:flex;flex-direction:column;gap:12px;width:280px;}
.splash-input{width:100%;padding:14px 18px;border-radius:var(--radius);border:1.5px solid var(--border);font-size:17px;text-align:center;background:#fff;color:var(--text);outline:none;font-family:'Noto Sans JP',sans-serif;transition:border-color 0.15s;}
.splash-input:focus{border-color:var(--accent);}
.btn{padding:14px 24px;border-radius:var(--radius);font-size:16px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;transition:all 0.18s;font-weight:500;width:100%;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#b04422;}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--surface2);}
.name-error{color:var(--accent);font-size:13px;text-align:center;display:none;}

/* SETUP */
#setup{background:var(--bg);align-items:center;justify-content:center;padding:24px;}
.setup-card{background:var(--surface);border-radius:var(--radius-lg);padding:40px 32px;width:100%;max-width:460px;box-shadow:var(--shadow);}
.setup-card h2{font-size:26px;margin-bottom:8px;}
.setup-card>p{color:var(--text2);font-size:15px;margin-bottom:32px;}
.setup-section{margin-bottom:28px;}
.setup-section h3{font-size:13px;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
.toggle-group{display:flex;gap:10px;flex-wrap:wrap;}
.toggle-btn{padding:10px 20px;border-radius:100px;font-size:15px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.count-btns{display:flex;gap:8px;flex-wrap:wrap;}
.count-btn{padding:10px 18px;border-radius:100px;font-size:15px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.count-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* NAV */
.app-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:22px;font-family:'Noto Serif JP',serif;color:var(--accent);}
.nav-btns{display:flex;gap:8px;}
.nav-btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.nav-btn:hover{background:var(--border);}

/* HOME */
#home{background:var(--bg);}
.home-content{padding:24px 20px;max-width:600px;margin:0 auto;width:100%;}
.greeting{font-size:24px;margin-bottom:6px;}
.greeting span{color:var(--accent);}
.home-subtitle{color:var(--text2);font-size:15px;margin-bottom:28px;}
.progress-card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;box-shadow:var(--shadow-sm);}
.progress-card h3{font-size:14px;color:var(--text2);margin-bottom:16px;}
.progress-bars{display:flex;flex-direction:column;gap:12px;}
.prog-row{display:flex;align-items:center;gap:12px;}
.prog-label{font-size:13px;color:var(--text2);width:48px;flex-shrink:0;}
.prog-bar{flex:1;height:8px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;transition:width 0.5s ease;}
.prog-fill.hira{background:var(--accent);}
.prog-fill.kata{background:var(--accent2);}
.prog-count{font-size:12px;color:var(--text3);width:48px;text-align:right;flex-shrink:0;}
.today-card{background:var(--accent);border-radius:var(--radius-lg);padding:24px;color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.18s;margin-bottom:20px;}
.today-card:hover{background:#b04422;}
.today-info h3{font-size:18px;font-weight:500;margin-bottom:4px;}
.today-info p{font-size:14px;opacity:0.8;}
.today-arrow{font-size:28px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);}
.stat-card .num{font-size:32px;font-weight:500;color:var(--accent);margin-bottom:4px;}
.stat-card .lbl{font-size:13px;color:var(--text2);}
.chart-card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.chart-card h3{font-size:14px;color:var(--text2);margin-bottom:16px;}
.week-chart{display:flex;align-items:flex-end;gap:8px;height:80px;}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.week-bar{width:100%;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px;transition:height 0.5s ease;}
.week-day{font-size:11px;color:var(--text3);}
.table-card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm);}
.table-card h3{font-size:14px;color:var(--text2);margin-bottom:16px;}
.kana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.kana-cell{text-align:center;padding:8px 4px;border-radius:8px;font-size:18px;cursor:pointer;transition:all 0.15s;}
.kana-cell.known{background:var(--green-light);color:var(--green);}
.kana-cell.learning{background:var(--accent-light);color:var(--accent);}
.kana-cell.unseen{background:var(--surface2);color:var(--text3);}
.kana-cell .roma{font-size:10px;margin-top:2px;font-family:'Noto Sans JP',sans-serif;}

/* STUDY */
#study{background:var(--bg);}
.study-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.study-progress{flex:1;margin:0 16px;}
.study-prog-bar{height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.study-prog-fill{height:100%;background:var(--accent);border-radius:100px;transition:width 0.4s ease;}
.study-count{font-size:12px;color:var(--text2);margin-top:6px;text-align:center;}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.swipe-card{background:var(--surface);border-radius:24px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.12);cursor:grab;position:relative;touch-action:none;}
.swipe-card:active{cursor:grabbing;}
.swipe-hint-left{position:absolute;top:20px;left:20px;background:var(--accent);color:#fff;padding:6px 14px;border-radius:100px;font-size:13px;opacity:0;transition:opacity 0.1s;pointer-events:none;}
.swipe-hint-right{position:absolute;top:20px;right:20px;background:var(--green);color:#fff;padding:6px 14px;border-radius:100px;font-size:13px;opacity:0;transition:opacity 0.1s;pointer-events:none;}
.card-type{font-size:12px;color:var(--text3);text-align:center;margin-bottom:12px;letter-spacing:0.1em;}
.card-kana{font-size:96px;text-align:center;line-height:1.1;margin-bottom:6px;font-family:'Noto Serif JP',serif;color:var(--text);}
.card-roma{font-size:22px;text-align:center;color:var(--text2);margin-bottom:16px;letter-spacing:0.1em;}
.card-sound-btn{display:flex;align-items:center;justify-content:center;margin:0 auto 20px;width:44px;height:44px;border-radius:50%;background:var(--accent-light);color:var(--accent);border:none;font-size:20px;cursor:pointer;transition:all 0.15s;}
.card-sound-btn:hover{background:var(--accent);color:#fff;}
.stroke-section{text-align:center;margin-bottom:16px;}
.stroke-label{font-size:12px;color:var(--text3);margin-bottom:8px;}
.stroke-svg{width:110px;height:110px;border:1px solid var(--border);border-radius:8px;background:var(--bg);}
.write-section{margin-bottom:16px;}
.write-canvas{border:1.5px dashed var(--border);border-radius:12px;background:var(--bg);cursor:crosshair;display:block;touch-action:none;width:100%;}
.write-btns{display:flex;gap:8px;justify-content:center;margin-top:8px;}
.write-btn{padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Noto Sans JP',sans-serif;}
.card-examples{border-top:1px solid var(--border);padding-top:14px;}
.ex-item{display:flex;gap:12px;margin-bottom:8px;align-items:baseline;}
.ex-kana{font-size:18px;font-weight:500;min-width:80px;font-family:'Noto Serif JP',serif;}
.ex-roma{font-size:12px;color:var(--text2);}
.ex-meaning{font-size:12px;color:var(--text3);}
.card-actions{display:flex;gap:12px;padding:16px 20px;justify-content:center;}
.action-btn{flex:1;max-width:160px;padding:14px;border-radius:var(--radius);font-size:15px;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.action-again{background:var(--accent-light);color:var(--accent);}
.action-again:hover{background:var(--accent);color:#fff;}
.action-know{background:var(--green-light);color:var(--green);}
.action-know:hover{background:var(--green);color:#fff;}

/* QUIZ */
#quiz{background:var(--bg);}
.quiz-content{padding:20px;max-width:520px;margin:0 auto;width:100%;}
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.quiz-prog{flex:1;height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.quiz-prog-fill{height:100%;background:var(--accent2);border-radius:100px;transition:width 0.4s;}
.quiz-num{font-size:13px;color:var(--text2);}
.quiz-question{background:var(--surface);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px;text-align:center;box-shadow:var(--shadow-sm);}
.q-type{font-size:12px;color:var(--text3);margin-bottom:12px;letter-spacing:0.08em;}
.q-kana{font-size:72px;font-family:'Noto Serif JP',serif;line-height:1.2;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.quiz-opt{padding:16px;border-radius:var(--radius);font-size:20px;font-family:'Noto Serif JP',serif;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s;text-align:center;}
.quiz-opt:hover{border-color:var(--accent2);background:var(--accent2-light);}
.quiz-opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green);}
.quiz-opt.wrong{background:#FEF2F0;border-color:#E74C3C;color:#E74C3C;}
.quiz-opt.show-correct{background:var(--green-light);border-color:var(--green);}
.fill-input{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:22px;text-align:center;font-family:'Noto Serif JP',serif;outline:none;background:var(--bg);color:var(--text);}
.fill-input:focus{border-color:var(--accent2);}
.fill-input.correct{border-color:var(--green);background:var(--green-light);}
.fill-input.wrong{border-color:var(--accent);background:var(--accent-light);}
.quiz-next-btn{width:100%;margin-top:16px;padding:14px;border-radius:var(--radius);font-size:16px;cursor:pointer;border:none;background:var(--accent2);color:#fff;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all 0.18s;}
.quiz-next-btn:hover{background:#1d6aab;}
.result-box{text-align:center;padding:40px 20px;}
.result-emoji{font-size:64px;margin-bottom:16px;}
.result-title{font-size:28px;margin-bottom:8px;}
.result-sub{font-size:15px;color:var(--text2);margin-bottom:32px;}
.result-stats{display:flex;gap:20px;justify-content:center;margin-bottom:32px;}
.result-stat .n{font-size:36px;font-weight:500;color:var(--accent);}
.result-stat .l{font-size:13px;color:var(--text2);}

/* COMPLETE */
#complete{background:var(--bg);align-items:center;justify-content:center;padding:24px;}
.complete-card{background:var(--surface);border-radius:var(--radius-lg);padding:40px 32px;max-width:400px;width:100%;text-align:center;box-shadow:var(--shadow);}
.complete-emoji{font-size:64px;margin-bottom:16px;}
.complete-card h2{font-size:26px;margin-bottom:8px;}
.complete-card p{color:var(--text2);font-size:15px;margin-bottom:8px;}
.complete-accent{color:var(--accent);font-size:18px;margin-bottom:28px;font-weight:500;}

.fade-in{animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.fly-left{animation:flyLeft 0.35s ease-in forwards;}
.fly-right{animation:flyRight 0.35s ease-in forwards;}
@keyframes flyLeft{to{transform:translateX(-130%) rotate(-15deg);opacity:0;}}
@keyframes flyRight{to{transform:translateX(130%) rotate(15deg);opacity:0;}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
</style>
</head>
<body>

<!-- SPLASH: just enter name -->
<div id="splash" class="screen" style="align-items:center;justify-content:center;">
  <div class="splash-logo">かな</div>
  <div class="splash-sub">日语假名学习</div>
  <div class="splash-btns">
    <input type="text" id="name-input" class="splash-input" placeholder="你叫什么名字？"
      autocomplete="name" maxlength="20"
      onkeydown="if(event.key==='Enter')enterByName()">
    <button class="btn btn-primary" onclick="enterByName()">开始学习 →</button>
    <div class="name-error" id="name-error">请输入你的名字</div>
  </div>
</div>

<!-- SETUP -->
<div id="setup" class="screen hidden">
  <div class="setup-card fade-in">
    <h2 id="setup-title">你好！</h2>
    <p>设置一下你的学习计划吧</p>
    <div class="setup-section">
      <h3>学习内容</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" onclick="toggleType(this,'hiragana')">平假名 あ</button>
        <button class="toggle-btn active" onclick="toggleType(this,'katakana')">片假名 ア</button>
      </div>
    </div>
    <div class="setup-section">
      <h3>每天学多少个？</h3>
      <div class="count-btns">
        <button class="count-btn" onclick="setCount(this,5)">5个</button>
        <button class="count-btn active" onclick="setCount(this,10)">10个</button>
        <button class="count-btn" onclick="setCount(this,15)">15个</button>
        <button class="count-btn" onclick="setCount(this,20)">20个</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveSetup()">出发！</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen hidden">
  <div class="app-nav">
    <div class="nav-logo">かな</div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="switchTable()">五十音表</button>
      <button class="nav-btn" onclick="resetUser()">换人</button>
    </div>
  </div>
  <div class="home-content fade-in">
    <div class="greeting">你好，<span id="home-name"></span>！</div>
    <div class="home-subtitle">今天继续学习日语假名吧</div>

    <div class="today-card" onclick="startStudy()">
      <div class="today-info">
        <h3 id="today-title">今日任务</h3>
        <p id="today-sub">点击开始</p>
      </div>
      <div class="today-arrow">→</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">已掌握假名</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-streak">0</div>
        <div class="lbl">连续学习天数</div>
      </div>
    </div>

    <div class="progress-card">
      <h3>学习进度</h3>
      <div class="progress-bars">
        <div class="prog-row">
          <div class="prog-label">平假名</div>
          <div class="prog-bar"><div class="prog-fill hira" id="prog-hira" style="width:0%"></div></div>
          <div class="prog-count" id="prog-hira-count">0/46</div>
        </div>
        <div class="prog-row">
          <div class="prog-label">片假名</div>
          <div class="prog-bar"><div class="prog-fill kata" id="prog-kata" style="width:0%"></div></div>
          <div class="prog-count" id="prog-kata-count">0/46</div>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <h3>本周学习记录</h3>
      <div class="week-chart" id="week-chart"></div>
    </div>

    <div class="table-card">
      <h3>五十音总览</h3>
      <div id="table-toggle" style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="toggle-btn active" id="ttab-hira" style="font-size:13px;padding:6px 14px;" onclick="switchTableTo('hira')">平假名</button>
        <button class="toggle-btn" id="ttab-kata" style="font-size:13px;padding:6px 14px;" onclick="switchTableTo('kata')">片假名</button>
      </div>
      <div class="kana-grid" id="kana-overview"></div>
    </div>
  </div>
</div>

<!-- STUDY -->
<div id="study" class="screen hidden">
  <div class="app-nav">
    <div class="nav-logo">かな</div>
    <div class="study-progress">
      <div class="study-prog-bar"><div class="study-prog-fill" id="study-prog-fill"></div></div>
      <div class="study-count" id="study-count"></div>
    </div>
    <button class="nav-btn" onclick="goHome()">主页</button>
  </div>
  <div class="card-area">
    <div class="swipe-card" id="swipe-card">
      <div class="swipe-hint-left" id="hint-left">再学一遍</div>
      <div class="swipe-hint-right" id="hint-right">已掌握 ✓</div>
      <div class="card-type" id="card-type"></div>
      <div class="card-kana" id="card-kana"></div>
      <div class="card-roma" id="card-roma"></div>
      <button class="card-sound-btn" onclick="playKanaSound()">🔊</button>
      <div class="stroke-section">
        <div class="stroke-label">笔顺参考</div>
        <div style="display:flex;justify-content:center;">
          <svg class="stroke-svg" id="stroke-svg" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>
      <div class="write-section">
        <div class="stroke-label" style="margin-bottom:6px;">描红练习</div>
        <canvas class="write-canvas" id="write-canvas" height="140"></canvas>
        <div class="write-btns"><button class="write-btn" onclick="clearCanvas()">清除</button></div>
      </div>
      <div class="card-examples" id="card-examples"></div>
    </div>
  </div>
  <div class="card-actions">
    <button class="action-btn action-again" onclick="swipeCard('left')">← 再学一遍</button>
    <button class="action-btn action-know" onclick="swipeCard('right')">已掌握 →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen hidden">
  <div class="app-nav">
    <div class="nav-logo">かな</div>
    <div style="font-size:14px;color:var(--text2);">学习检验</div>
    <button class="nav-btn" onclick="showComplete()">跳过</button>
  </div>
  <div class="quiz-content fade-in">
    <div class="quiz-header">
      <div class="quiz-prog"><div class="quiz-prog-fill" id="quiz-prog-fill"></div></div>
      <div class="quiz-num" id="quiz-num"></div>
    </div>
    <div id="quiz-body"></div>
  </div>
</div>

<!-- COMPLETE -->
<div id="complete" class="screen hidden">
  <div class="complete-card fade-in">
    <div class="complete-emoji">🎉</div>
    <h2>今日任务完成！</h2>
    <p id="complete-msg">坚持每天学习，你最棒！</p>
    <div class="complete-accent" id="complete-stats"></div>
    <button class="btn btn-primary" style="margin-bottom:12px;" onclick="goHome()">回到主页</button>
    <button class="btn btn-secondary" onclick="startStudy()">继续学更多</button>
  </div>
</div>

// ===================== STORAGE =====================
var STORE_KEY = 'kana_data_';
function save(){
  try{ localStorage.setItem(STORE_KEY+state.name, JSON.stringify(state)); }catch(e){}
}
function load(name){
  try{
    var d = localStorage.getItem(STORE_KEY+name);
    if(d){ state = JSON.parse(d); return true; }
  }catch(e){}
  return false;
}

// ===================== ENTRY =====================
function enterByName(){
  var inp = document.getElementById('name-input');
  var name = inp.value.trim();
  if(!name){ document.getElementById('name-error').style.display='block'; return; }
  document.getElementById('name-error').style.display='none';
  state.name = name;
  var found = load(name);
  if(!found){
    // New user: reset then go setup
    state = {name:name,settings:{types:['hiragana','katakana'],dailyCount:10},progress:{hiragana:{},katakana:{}},todayStudied:[],streak:0,weekData:[0,0,0,0,0,0,0],lastStudyDate:null};
    show('setup');
    document.getElementById('setup-title').textContent = '你好，' + name + '！';
    // sync setup UI defaults
    setupTypes = ['hiragana','katakana'];
    setupCount = 10;
  } else {
    checkDay();
    showHome();
  }
  localStorage.setItem('kana_last', name);
}

function checkDay(){
  var today = new Date().toDateString();
  if(state.lastStudyDate && state.lastStudyDate !== today){
    var prev = new Date(state.lastStudyDate);
    var diff = Math.round((new Date(today)-prev)/86400000);
    if(diff===1) state.streak++; else if(diff>1) state.streak=0;
    state.weekData.push(state.todayStudied.length);
    if(state.weekData.length>7) state.weekData = state.weekData.slice(-7);
    state.todayStudied = [];
    state.lastStudyDate = today;
    save();
  } else if(!state.lastStudyDate){
    state.lastStudyDate = today;
  }
}

// ===================== SETUP =====================
function toggleType(btn, type){
  var i = setupTypes.indexOf(type);
  if(i>-1){ if(setupTypes.length===1) return; setupTypes.splice(i,1); btn.classList.remove('active'); }
  else { setupTypes.push(type); btn.classList.add('active'); }
}
function setCount(btn, n){
  setupCount = n;
  document.querySelectorAll('.count-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}
function saveSetup(){
  state.settings = {types:setupTypes.slice(), dailyCount:setupCount};
  state.lastStudyDate = new Date().toDateString();
  save();
  showHome();
}

// ===================== HOME =====================
function showHome(){
  show('home');
  document.getElementById('home-name').textContent = state.name;
  var hira = HIRAGANA.filter(function(k){ return state.progress.hiragana && state.progress.hiragana[k.r]==='known'; }).length;
  var kata = KATAKANA.filter(function(k){ return state.progress.katakana && state.progress.katakana[k.r]==='known'; }).length;
  document.getElementById('stat-total').textContent = hira+kata;
  document.getElementById('stat-streak').textContent = state.streak;
  document.getElementById('prog-hira').style.width = Math.round(hira/46*100)+'%';
  document.getElementById('prog-kata').style.width = Math.round(kata/46*100)+'%';
  document.getElementById('prog-hira-count').textContent = hira+'/46';
  document.getElementById('prog-kata-count').textContent = kata+'/46';
  var done = state.todayStudied.length, goal = state.settings.dailyCount;
  var rem = Math.max(0, goal-done);
  document.getElementById('today-title').textContent = rem===0 ? '今日任务完成 🎉' : '今日任务';
  document.getElementById('today-sub').textContent = rem===0 ? '点击继续复习' : '还剩 '+rem+' 个假名';
  renderWeekChart();
  renderOverviewTable(tableMode);
}
function renderWeekChart(){
  var days=['一','二','三','四','五','六','日'];
  var max = Math.max.apply(null, state.weekData.concat([1]));
  var html = state.weekData.map(function(v,i){
    var h = Math.round(v/max*64);
    return '<div class="week-bar-wrap"><div class="week-bar" style="height:'+h+'px"></div><div class="week-day">'+days[i]+'</div></div>';
  }).join('');
  document.getElementById('week-chart').innerHTML = html;
}
function switchTable(){ /* toggle from nav */ switchTableTo(tableMode==='hira'?'kata':'hira'); }
function switchTableTo(mode){
  tableMode = mode;
  document.getElementById('ttab-hira').classList.toggle('active', mode==='hira');
  document.getElementById('ttab-kata').classList.toggle('active', mode==='kata');
  renderOverviewTable(mode);
}
function renderOverviewTable(mode){
  var arr = mode==='hira'?HIRAGANA:KATAKANA;
  var pkey = mode==='hira'?'hiragana':'katakana';
  var html = arr.map(function(k){
    var st = state.progress[pkey] && state.progress[pkey][k.r];
    var cls = st==='known'?'known':st?'learning':'unseen';
    return '<div class="kana-cell '+cls+'" title="'+k.r+'">'+k.k+'<div class="roma">'+k.r+'</div></div>';
  }).join('');
  document.getElementById('kana-overview').innerHTML = html;
}
function goHome(){ show('home'); showHome(); }
function resetUser(){
  localStorage.removeItem('kana_last');
  state = {name:'',settings:{types:['hiragana','katakana'],dailyCount:10},progress:{hiragana:{},katakana:{}},todayStudied:[],streak:0,weekData:[0,0,0,0,0,0,0],lastStudyDate:null};
  document.getElementById('name-input').value='';
  show('splash');
}

// ===================== STUDY =====================
function shuffle(arr){ return arr.slice().sort(function(){ return Math.random()-0.5; }); }
function buildQueue(){
  var types = state.settings.types, all = [];
  if(types.indexOf('hiragana')>-1) all = all.concat(HIRAGANA.map(function(k){ return Object.assign({},k,{type:'hiragana',typeLabel:'平假名'}); }));
  if(types.indexOf('katakana')>-1) all = all.concat(KATAKANA.map(function(k){ return Object.assign({},k,{type:'katakana',typeLabel:'片假名'}); }));
  var unseen = all.filter(function(k){ return !state.progress[k.type] || !state.progress[k.type][k.r]; });
  var learning = all.filter(function(k){ return state.progress[k.type] && state.progress[k.type][k.r]==='learning'; });
  return shuffle(unseen).concat(shuffle(learning)).slice(0, state.settings.dailyCount);
}
function startStudy(){
  studyQueue = buildQueue();
  if(!studyQueue.length){ alert('所有假名已掌握！你太棒了！'); return; }
  currentCardIdx = 0;
  show('study');
  showCard(studyQueue[0]);
}
function showCard(card){
  currentCard = card;
  document.getElementById('card-type').textContent = card.typeLabel;
  document.getElementById('card-kana').textContent = card.k;
  document.getElementById('card-roma').textContent = card.r;
  updateStudyProg();
  renderStrokeSVG(card);
  renderExamples(card);
  setupCanvas();
  clearCanvas();
  initSwipe();
  setTimeout(playKanaSound, 300);
  document.getElementById('hint-left').style.opacity='0';
  document.getElementById('hint-right').style.opacity='0';
  var sc = document.getElementById('swipe-card');
  sc.style.transform=''; sc.style.opacity='1';
  sc.classList.remove('fly-left','fly-right');
}
function updateStudyProg(){
  var pct = studyQueue.length ? Math.round(currentCardIdx/studyQueue.length*100) : 0;
  document.getElementById('study-prog-fill').style.width = pct+'%';
  document.getElementById('study-count').textContent = currentCardIdx+'/'+studyQueue.length;
}
function renderStrokeSVG(card){
  var svg = document.getElementById('stroke-svg');
  var paths = card.type==='hiragana' ? STROKES[card.k] : KATAKANA_STROKES[card.k];
  if(!paths||!paths.length){
    svg.innerHTML='<text x="55" y="78" text-anchor="middle" font-size="72" fill="var(--text)" font-family="Noto Serif JP,serif">'+card.k+'</text>';
    return;
  }
  var colors=['#C8502A','#2A7AC8','#2A8A5A','#9B59B6','#E67E22'];
  var pathEls = paths.map(function(d,i){
    return '<path d="M'+d.replace(/^M/,'')+'" stroke="'+colors[i%colors.length]+'" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="200" stroke-dashoffset="200"><animate attributeName="stroke-dashoffset" from="200" to="0" dur="0.7s" begin="'+(i*0.75)+'s" fill="freeze"/></path>';
  }).join('');
  svg.innerHTML = '<text x="55" y="78" text-anchor="middle" font-size="72" fill="var(--border)" font-family="Noto Serif JP,serif" opacity="0.25">'+card.k+'</text>'+pathEls;
  // restart animation by cloning
  var fresh = svg.cloneNode(true);
  svg.parentNode.replaceChild(fresh, svg);
}
function renderExamples(card){
  var exs = EXAMPLES[card.r] || [];
  var el = document.getElementById('card-examples');
  if(!exs.length){ el.innerHTML=''; return; }
  el.innerHTML = exs.slice(0,2).map(function(e){
    var p = e.split('/');
    return '<div class="ex-item"><div class="ex-kana">'+(p[0]||'')+'</div><div><div class="ex-roma">'+(p[1]||'')+'</div><div class="ex-meaning">'+(p[2]||'')+'</div></div></div>';
  }).join('');
}
function playKanaSound(){
  if(!synth || !currentCard) return;
  if(synth.speaking) synth.cancel();
  var u = new SpeechSynthesisUtterance(currentCard.k);
  u.lang = 'ja-JP'; u.rate = 0.8;
  if(jpVoice) u.voice = jpVoice;
  synth.speak(u);
}

// Canvas drawing
function setupCanvas(){
  var canvas = document.getElementById('write-canvas');
  var w = canvas.parentElement.offsetWidth || 280;
  canvas.width = w; canvas.height = 140;
  canvas.style.width = w+'px';
  ctx2d = canvas.getContext('2d');
  ctx2d.lineWidth = 4; ctx2d.lineCap = 'round'; ctx2d.lineJoin = 'round';
  ctx2d.strokeStyle = '#C8502A';
  canvas.onmousedown = function(e){ if(e.target!==canvas) return; isDrawing=true; var p=getPos(e,canvas); lastX=p[0]; lastY=p[1]; };
  canvas.onmousemove = function(e){ if(!isDrawing) return; drawLine(e,canvas); };
  canvas.onmouseup = function(){ isDrawing=false; };
  canvas.onmouseleave = function(){ isDrawing=false; };
  canvas.ontouchstart = function(e){ e.preventDefault(); isDrawing=true; var p=getPos(e.touches[0],canvas); lastX=p[0]; lastY=p[1]; };
  canvas.ontouchmove = function(e){ e.preventDefault(); if(!isDrawing) return; drawLine(e.touches[0],canvas); };
  canvas.ontouchend = function(){ isDrawing=false; };
}
function getPos(e,canvas){ var r=canvas.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }
function drawLine(e,canvas){ var p=getPos(e,canvas); ctx2d.beginPath(); ctx2d.moveTo(lastX,lastY); ctx2d.lineTo(p[0],p[1]); ctx2d.stroke(); lastX=p[0]; lastY=p[1]; }
function clearCanvas(){
  if(!ctx2d || !currentCard) return;
  var canvas = document.getElementById('write-canvas');
  ctx2d.clearRect(0,0,canvas.width,canvas.height);
  ctx2d.save();
  ctx2d.globalAlpha = 0.07;
  ctx2d.font = Math.min(canvas.height*0.8,110)+'px "Noto Serif JP",serif';
  ctx2d.fillStyle = '#1A1916';
  ctx2d.textAlign = 'center'; ctx2d.textBaseline = 'middle';
  ctx2d.fillText(currentCard.k, canvas.width/2, canvas.height/2);
  ctx2d.restore();
  ctx2d.strokeStyle = '#C8502A';
}

// Swipe
function initSwipe(){
  var card = document.getElementById('swipe-card');
  card.onmousedown = function(e){
    if(e.target.closest('canvas')||e.target.tagName==='BUTTON') return;
    startX=e.clientX; isDragging=true; card.style.transition='none';
  };
  document.onmousemove = function(e){
    if(!isDragging) return; dragCard(e.clientX-startX);
  };
  document.onmouseup = function(e){
    if(!isDragging) return; isDragging=false; card.style.transition=''; releaseDrag(e.clientX-startX);
  };
  card.ontouchstart = function(e){
    if(e.target.closest('canvas')||e.target.tagName==='BUTTON') return;
    startX=e.touches[0].clientX; isDragging=true; card.style.transition='none';
  };
  card.ontouchmove = function(e){
    if(!isDragging) return;
    var dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-(e.touches[0].clientY);
    e.preventDefault(); dragCard(dx);
  };
  card.ontouchend = function(e){
    if(!isDragging) return; isDragging=false; card.style.transition=''; releaseDrag(e.changedTouches[0].clientX-startX);
  };
}
function dragCard(dx){
  cardOffsetX=dx;
  var card=document.getElementById('swipe-card');
  card.style.transform='translateX('+dx+'px) rotate('+(dx*0.04)+'deg)';
  document.getElementById('hint-left').style.opacity = dx<-30 ? Math.min(1,(-dx-30)/60) : 0;
  document.getElementById('hint-right').style.opacity = dx>30 ? Math.min(1,(dx-30)/60) : 0;
}
function releaseDrag(dx){
  cardOffsetX=0;
  if(dx<-80){ swipeCard('left'); }
  else if(dx>80){ swipeCard('right'); }
  else {
    var card=document.getElementById('swipe-card');
    card.style.transition='transform 0.3s';
    card.style.transform='';
    document.getElementById('hint-left').style.opacity='0';
    document.getElementById('hint-right').style.opacity='0';
    setTimeout(function(){ card.style.transition=''; },300);
  }
}
function swipeCard(dir){
  var card=document.getElementById('swipe-card');
  card.classList.add(dir==='left'?'fly-left':'fly-right');
  if(!state.progress[currentCard.type]) state.progress[currentCard.type]={};
  var key = currentCard.r+'_'+currentCard.type;
  if(dir==='right'){
    state.progress[currentCard.type][currentCard.r]='known';
    if(state.todayStudied.indexOf(key)<0) state.todayStudied.push(key);
  } else {
    state.progress[currentCard.type][currentCard.r]='learning';
    studyQueue.push(currentCard);
  }
  if(!state.lastStudyDate) state.lastStudyDate = new Date().toDateString();
  save();
  setTimeout(function(){
    currentCardIdx++;
    if(currentCardIdx>=studyQueue.length){ startQuiz(); }
    else { showCard(studyQueue[currentCardIdx]); }
  }, 380);
}

// ===================== QUIZ =====================
function startQuiz(){
  var types=state.settings.types, all=[];
  if(types.indexOf('hiragana')>-1) all=all.concat(HIRAGANA.map(function(k){ return Object.assign({},k,{type:'hiragana'}); }));
  if(types.indexOf('katakana')>-1) all=all.concat(KATAKANA.map(function(k){ return Object.assign({},k,{type:'katakana'}); }));
  var known=all.filter(function(k){ return state.progress[k.type]&&state.progress[k.type][k.r]==='known'; });
  if(known.length<4){ showComplete(); return; }
  quizItems=shuffle(known).slice(0,Math.min(8,known.length));
  quizIdx=0; quizScore=0;
  show('quiz');
  showQuizQ();
}
function showQuizQ(){
  if(quizIdx>=quizItems.length){ showQuizResult(); return; }
  var pct=Math.round(quizIdx/quizItems.length*100);
  document.getElementById('quiz-prog-fill').style.width=pct+'%';
  document.getElementById('quiz-num').textContent=(quizIdx+1)+'/'+quizItems.length;
  var item=quizItems[quizIdx];
  var all=HIRAGANA.concat(KATAKANA);
  var pool=shuffle(all.filter(function(k){ return k.r!==item.r; })).slice(0,3);
  var qtype=quizIdx%3;
  var body=document.getElementById('quiz-body');
  if(qtype===0){
    var opts=shuffle([item].concat(pool)).map(function(o){
      return '<button class="quiz-opt" onclick="checkMC(this,\''+o.r+'\',\''+item.r+'\')">'+o.r+'</button>';
    }).join('');
    body.innerHTML='<div class="quiz-question fade-in"><div class="q-type">这个假名怎么读？</div><div class="q-kana">'+item.k+'</div></div><div class="quiz-options">'+opts+'</div>';
  } else if(qtype===1){
    var opts2=shuffle([item].concat(pool)).map(function(o){
      return '<button class="quiz-opt" style="font-size:32px;font-family:\'Noto Serif JP\',serif" onclick="checkMC(this,\''+o.r+'\',\''+item.r+'\')">'+o.k+'</button>';
    }).join('');
    body.innerHTML='<div class="quiz-question fade-in"><div class="q-type">哪个是「'+item.r+'」？</div><div class="q-kana" style="font-size:32px;font-family:\'Noto Sans JP\',sans-serif;">'+item.r+'</div></div><div class="quiz-options">'+opts2+'</div>';
  } else {
    body.innerHTML='<div class="quiz-question fade-in"><div class="q-type">写出这个假名的读音</div><div class="q-kana">'+item.k+'</div></div><div style="padding:0 4px"><input class="fill-input" id="fill-input" placeholder="输入罗马字..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key===\'Enter\')checkFill(\''+item.r+'\')"><button class="quiz-next-btn" onclick="checkFill(\''+item.r+'\')">确认</button></div>';
    setTimeout(function(){ var f=document.getElementById('fill-input'); if(f)f.focus(); },100);
  }
}
function checkMC(btn,chosen,correct){
  document.querySelectorAll('.quiz-opt').forEach(function(b){ b.onclick=null; });
  if(chosen===correct){ btn.classList.add('correct'); quizScore++; }
  else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(function(b){
      if(b.textContent.trim()===correct) b.classList.add('show-correct');
    });
  }
  setTimeout(function(){ quizIdx++; showQuizQ(); },900);
}
function checkFill(correct){
  var inp=document.getElementById('fill-input');
  var val=inp.value.trim().toLowerCase();
  inp.readOnly=true;
  if(val===correct){ inp.classList.add('correct'); quizScore++; }
  else { inp.classList.add('wrong'); inp.value='✗ 正确：'+correct; }
  setTimeout(function(){ quizIdx++; showQuizQ(); },1100);
}
function showQuizResult(){
  var pct=Math.round(quizScore/quizItems.length*100);
  var emoji=pct>=80?'🌟':pct>=60?'👍':'💪';
  var msg=pct>=80?'太棒了！':pct>=60?'继续加油！':'多练习，你能行！';
  document.getElementById('quiz-body').innerHTML='<div class="result-box fade-in"><div class="result-emoji">'+emoji+'</div><div class="result-title">'+msg+'</div><div class="result-sub">今日测验完成</div><div class="result-stats"><div class="result-stat"><div class="n">'+quizScore+'</div><div class="l">答对</div></div><div class="result-stat"><div class="n">'+(quizItems.length-quizScore)+'</div><div class="l">答错</div></div><div class="result-stat"><div class="n">'+pct+'%</div><div class="l">正确率</div></div></div><button class="quiz-next-btn" onclick="showComplete()">完成！</button></div>';
}
function showComplete(){
  show('complete');
  var types=state.settings.types, known=0;
  if(types.indexOf('hiragana')>-1) known+=HIRAGANA.filter(function(k){ return state.progress.hiragana&&state.progress.hiragana[k.r]==='known'; }).length;
  if(types.indexOf('katakana')>-1) known+=KATAKANA.filter(function(k){ return state.progress.katakana&&state.progress.katakana[k.r]==='known'; }).length;
  document.getElementById('complete-msg').textContent = state.name + '，你今天表现得很棒！';
  document.getElementById('complete-stats').textContent = '已掌握 '+known+' 个假名，继续加油！';
  var today=new Date().toDateString();
  if(state.lastStudyDate!==today){ state.lastStudyDate=today; state.streak++; }
  state.weekData[state.weekData.length-1] = state.todayStudied.length;
  save();
}

// ===================== UTILS =====================
function show(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

// ===================== INIT =====================
window.onload = function(){
  var last = localStorage.getItem('kana_last');
  if(last){
    var ok = load(last);
    if(ok && state.name){
      document.getElementById('name-input').value = state.name;
      checkDay();
      showHome();
      return;
    }
  }
  show('splash');
  setTimeout(function(){ document.getElementById('name-input').focus(); }, 300);
};
</script>
