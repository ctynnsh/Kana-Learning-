<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>かな</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8F7F4;--sf:#fff;--sf2:#F0EEE9;--bd:#E2DDD6;
  --t:#18160F;--t2:#6A6659;--t3:#ABA79F;
  --ac:#C0461E;--acl:#FAEEE9;
  --ac2:#1E6BC0;--ac2l:#E9F1FA;
  --gr:#1E8A50;--grl:#E9F6EE;
  --r:10px;--rl:16px;
}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t);user-select:none}
.hidden{display:none!important}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* ── SPLASH ── */
#splash{align-items:center;justify-content:center;gap:0;background:var(--bg)}
.sp-logo{font-size:72px;font-family:'Noto Serif JP',serif;color:var(--ac);line-height:1;margin-bottom:2px}
.sp-sub{font-size:17px;color:var(--t2);letter-spacing:.18em;margin-bottom:32px}
.sp-form{display:flex;flex-direction:column;gap:9px;width:220px}
.sp-inp{width:100%;padding:11px 14px;border-radius:var(--r);border:1.5px solid var(--bd);font-size:15px;text-align:center;background:#fff;color:var(--t);outline:none;font-family:inherit;transition:border-color .15s}
.sp-inp:focus{border-color:var(--ac)}
.btn{padding:11px 16px;border-radius:var(--r);font-size:14px;font-family:inherit;cursor:pointer;border:none;font-weight:500;width:100%;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-p{background:var(--ac);color:#fff}
.btn-s{background:var(--sf);color:var(--t);border:1.5px solid var(--bd)}
.sp-err{color:var(--ac);font-size:11px;text-align:center;display:none}

/* ── SETUP ── */
#setup{align-items:center;justify-content:center;padding:16px;background:var(--bg);overflow-y:auto}
.su-card{background:var(--sf);border-radius:var(--rl);padding:22px 18px;width:100%;max-width:340px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.su-card h2{font-family:'Noto Serif JP',serif;font-size:18px;margin-bottom:3px}
.su-card>p{color:var(--t2);font-size:12px;margin-bottom:18px}
.su-sec{margin-bottom:16px}
.su-sec h3{font-size:10px;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:100px;font-size:12px;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--t);font-family:inherit;transition:all .15s}
.chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
.chip.on2{background:var(--ac2);border-color:var(--ac2);color:#fff}

/* ── NAV ── */
.nav{display:flex;align-items:center;padding:0 12px;height:44px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px}
.nav-logo{font-family:'Noto Serif JP',serif;font-size:17px;color:var(--ac)}
.nav-center{flex:1;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:0 6px}
.nav-pb{height:2px;background:var(--sf2);border-radius:2px;overflow:hidden}
.nav-pf{height:100%;background:var(--ac);border-radius:2px;transition:width .4s}
.nav-pc{font-size:9px;color:var(--t3);text-align:center}
.nav-btns{display:flex;gap:4px;flex-shrink:0}
.nbtn{padding:4px 9px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--t2);font-family:inherit}

/* ── HOME ── */
#home{background:var(--bg);overflow-y:auto}
.hscroll{padding:10px 12px;max-width:500px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:8px}
.hgreeting{font-family:'Noto Serif JP',serif;font-size:17px}
.hgreeting span{color:var(--ac)}
.hsub{color:var(--t2);font-size:11px;margin-top:-4px}
.today-btn{background:var(--ac);border-radius:var(--rl);padding:13px 16px;color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.today-btn h3{font-size:14px;font-weight:500;margin-bottom:1px}
.today-btn p{font-size:11px;opacity:.8}
.today-arr{font-size:20px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{background:var(--sf);border-radius:var(--r);padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.sc .n{font-size:24px;font-weight:500;color:var(--ac)}
.sc .l{font-size:10px;color:var(--t2);margin-top:1px}
.card{background:var(--sf);border-radius:var(--rl);padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card h3{font-size:11px;color:var(--t2);margin-bottom:8px}
.prow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.plbl{font-size:10px;color:var(--t2);width:34px;flex-shrink:0}
.pbar{flex:1;height:5px;background:var(--sf2);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .5s}
.pfill.h{background:var(--ac)}.pfill.k{background:var(--ac2)}
.pcnt{font-size:9px;color:var(--t3);width:32px;text-align:right;flex-shrink:0}
.wchart{display:flex;align-items:flex-end;gap:4px;height:36px}
.wbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.wb{width:100%;background:var(--ac);border-radius:1px 1px 0 0;min-height:1px}
.wd{font-size:8px;color:var(--t3)}
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px}
.kc{text-align:center;padding:4px 1px;border-radius:4px;font-size:13px}
.kc.known{background:var(--grl);color:var(--gr)}
.kc.learning{background:var(--acl);color:var(--ac)}
.kc.unseen{background:var(--sf2);color:var(--t3)}
.kc .r{font-size:7px;margin-top:1px}

/* ── STUDY ── */
#study{background:var(--bg)}
/* portrait: kana top half, panels bottom half */
.study-body{flex:1;min-height:0;display:flex;gap:6px;padding:6px 8px;overflow:hidden}

/* Default portrait layout */
@media(max-aspect-ratio:4/3){
  .study-body{flex-direction:column}
  .kana-col{flex:0 0 auto;height:46dvh;min-height:160px}
  .panels-col{flex:1;min-height:0;flex-direction:row}
  .stroke-box{flex:0 0 auto;aspect-ratio:1/1;height:100%}
  .write-box{flex:1;min-width:0}
}
/* Landscape / wide */
@media(min-aspect-ratio:4/3){
  .study-body{flex-direction:row}
  .kana-col{flex:1;min-width:0}
  .panels-col{flex:0 0 130px;flex-direction:column}
  .stroke-box{flex:0 0 130px;height:130px}
  .write-box{flex:1;min-height:0}
}

.kana-col{display:flex;flex-direction:column;min-height:0}
.panels-col{display:flex;gap:6px;min-height:0}

/* Swipe card */
.scard{flex:1;background:var(--sf);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.09);display:flex;flex-direction:column;padding:8px 12px;position:relative;overflow:hidden;touch-action:none;cursor:grab;min-height:0}
.scard:active{cursor:grabbing}
.hbadge{position:absolute;top:7px;padding:3px 9px;border-radius:100px;font-size:10px;opacity:0;transition:opacity .1s;pointer-events:none;font-weight:500}
.hl{left:7px;background:var(--ac);color:#fff}
.hr{right:7px;background:var(--gr);color:#fff}
.ctype{font-size:9px;color:var(--t3);text-align:center;letter-spacing:.07em;margin-bottom:0}
.ckana{font-size:clamp(48px,9vw,68px);text-align:center;line-height:1;font-family:'Noto Serif JP',serif;color:var(--t);flex-shrink:0}
.croma{font-size:clamp(12px,2.2vw,15px);text-align:center;color:var(--t2);letter-spacing:.1em;margin-bottom:3px;flex-shrink:0}
.csound{display:flex;align-items:center;justify-content:center;margin:0 auto 3px;width:26px;height:26px;border-radius:50%;background:var(--acl);color:var(--ac);border:none;font-size:13px;cursor:pointer;flex-shrink:0}
.cexs{border-top:1px solid var(--bd);padding-top:5px;margin-top:auto;flex-shrink:0}
.exi{display:flex;gap:5px;margin-bottom:2px;align-items:baseline}
.exk{font-size:12px;font-weight:500;min-width:50px;font-family:'Noto Serif JP',serif}
.exr{font-size:9px;color:var(--t2)}
.exm{font-size:9px;color:var(--t3)}

/* Stroke + write boxes */
.stroke-box{background:var(--sf);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;flex-direction:column;align-items:stretch;overflow:hidden;flex-shrink:0}
.box-lbl{font-size:9px;color:var(--t3);text-align:center;padding:4px 0 2px;letter-spacing:.04em;flex-shrink:0}
.stroke-wrap{flex:1;position:relative;overflow:hidden}
.stroke-wrap svg{position:absolute;inset:0;width:100%;height:100%}
.write-box{background:var(--sf);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
#write-canvas{flex:1;touch-action:none;cursor:crosshair;display:block;width:100%;min-height:0}
.clr-btn{font-size:9px;color:var(--t3);background:none;border:none;cursor:pointer;padding:2px 0 3px;text-align:center;flex-shrink:0;font-family:inherit}

/* Actions */
.act-row{display:flex;gap:7px;padding:6px 8px;flex-shrink:0}
.abtn{flex:1;padding:10px;border-radius:var(--r);font-size:13px;cursor:pointer;border:none;font-family:inherit;font-weight:500;transition:opacity .15s}
.abtn:active{opacity:.7}
.a-again{background:var(--acl);color:var(--ac)}
.a-know{background:var(--grl);color:var(--gr)}

/* ── QUIZ ── */
#quiz{background:var(--bg);overflow-y:auto}
.qwrap{padding:12px;max-width:400px;margin:0 auto;width:100%}
.qhdr{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.qpb{flex:1;height:2px;background:var(--sf2);border-radius:2px;overflow:hidden}
.qpf{height:100%;background:var(--ac2);border-radius:2px;transition:width .4s}
.qnum{font-size:10px;color:var(--t2)}
.qq{background:var(--sf);border-radius:var(--rl);padding:18px;margin-bottom:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.qt{font-size:9px;color:var(--t3);margin-bottom:7px;letter-spacing:.07em}
.qk{font-size:56px;font-family:'Noto Serif JP',serif;line-height:1.2}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qopt{padding:12px;border-radius:var(--r);font-size:17px;font-family:'Noto Serif JP',serif;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--t);transition:all .15s;text-align:center}
.qopt.correct{background:var(--grl);border-color:var(--gr);color:var(--gr)}
.qopt.wrong{background:#FEF2F0;border-color:#E74C3C;color:#E74C3C}
.qopt.show-ok{background:var(--grl);border-color:var(--gr)}
.finp{width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:18px;text-align:center;font-family:'Noto Serif JP',serif;outline:none;background:var(--bg);color:var(--t)}
.finp:focus{border-color:var(--ac2)}
.finp.correct{border-color:var(--gr);background:var(--grl)}
.finp.wrong{border-color:var(--ac);background:var(--acl)}
.qnext{width:100%;margin-top:9px;padding:11px;border-radius:var(--r);font-size:13px;cursor:pointer;border:none;background:var(--ac2);color:#fff;font-family:inherit;font-weight:500}
.rbox{text-align:center;padding:24px 12px}
.rem{font-size:48px;margin-bottom:8px}
.rtitle{font-size:20px;margin-bottom:4px}
.rsub{font-size:12px;color:var(--t2);margin-bottom:16px}
.rstats{display:flex;gap:12px;justify-content:center;margin-bottom:16px}
.rstat .n{font-size:26px;font-weight:500;color:var(--ac)}
.rstat .l{font-size:10px;color:var(--t2)}

/* ── COMPLETE ── */
#complete{background:var(--bg);align-items:center;justify-content:center;padding:16px}
.ccard{background:var(--sf);border-radius:var(--rl);padding:26px 20px;max-width:300px;width:100%;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.cem{font-size:48px;margin-bottom:8px}
.ccard h2{font-family:'Noto Serif JP',serif;font-size:18px;margin-bottom:4px}
.ccard p{color:var(--t2);font-size:12px;margin-bottom:4px}
.cacc{color:var(--ac);font-size:14px;margin-bottom:18px;font-weight:500}

.fade-in{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fly-l{animation:fyl .28s ease-in forwards}
.fly-r{animation:fyr .28s ease-in forwards}
@keyframes fyl{to{transform:translateX(-120%) rotate(-10deg);opacity:0}}
@keyframes fyr{to{transform:translateX(120%) rotate(10deg);opacity:0}}
</style>
</head>
<body>

<div id="splash" class="screen">
  <div class="sp-logo">かな</div>
  <div class="sp-sub">日语假名学习</div>
  <div class="sp-form">
    <input id="name-inp" class="sp-inp" type="text" placeholder="你叫什么名字？" autocomplete="name" maxlength="16" onkeydown="if(event.key==='Enter')go()">
    <button class="btn btn-p" onclick="go()">开始学习 →</button>
    <div class="sp-err" id="sp-err">请输入你的名字</div>
  </div>
</div>

<div id="setup" class="screen hidden">
  <div class="su-card fade-in">
    <h2 id="su-title">你好！</h2>
    <p>设置一下你的学习计划</p>
    <div class="su-sec">
      <h3>学习内容</h3>
      <div class="chips">
        <button class="chip on" onclick="togT(this,'hiragana')">平假名 あ</button>
        <button class="chip on" onclick="togT(this,'katakana')">片假名 ア</button>
      </div>
    </div>
    <div class="su-sec">
      <h3>每天学习数量</h3>
      <div class="chips">
        <button class="chip" onclick="setN(this,5)">5个</button>
        <button class="chip on2" onclick="setN(this,10)">10个</button>
        <button class="chip" onclick="setN(this,15)">15个</button>
        <button class="chip" onclick="setN(this,20)">20个</button>
      </div>
    </div>
    <button class="btn btn-p" onclick="saveSetup()">出发！</button>
  </div>
</div>

<div id="home" class="screen hidden">
  <div class="nav">
    <div class="nav-logo">かな</div>
    <div style="flex:1"></div>
    <div class="nav-btns">
      <button class="nbtn" onclick="togTab()">五十音</button>
      <button class="nbtn" onclick="resetUser()">换人</button>
    </div>
  </div>
  <div class="hscroll fade-in">
    <div>
      <div class="hgreeting">你好，<span id="hname"></span>！</div>
      <div class="hsub">今天继续学习日语假名吧</div>
    </div>
    <div class="today-btn" onclick="startStudy()">
      <div><h3 id="today-t">今日任务</h3><p id="today-s">点击开始</p></div>
      <div class="today-arr">→</div>
    </div>
    <div class="row2">
      <div class="sc"><div class="n" id="sttotal">0</div><div class="l">已掌握假名</div></div>
      <div class="sc"><div class="n" id="ststreak">0</div><div class="l">连续学习天</div></div>
    </div>
    <div class="card">
      <h3>学习进度</h3>
      <div class="prow"><div class="plbl">平假名</div><div class="pbar"><div class="pfill h" id="ph" style="width:0%"></div></div><div class="pcnt" id="phc">0/46</div></div>
      <div class="prow"><div class="plbl">片假名</div><div class="pbar"><div class="pfill k" id="pk" style="width:0%"></div></div><div class="pcnt" id="pkc">0/46</div></div>
    </div>
    <div class="card">
      <h3>本周学习</h3>
      <div class="wchart" id="wchart"></div>
    </div>
    <div class="card">
      <h3>五十音总览</h3>
      <div style="display:flex;gap:5px;margin-bottom:7px">
        <button class="chip on" id="th" style="font-size:10px;padding:3px 9px" onclick="switchTab('h')">平假名</button>
        <button class="chip" id="tk" style="font-size:10px;padding:3px 9px" onclick="switchTab('k')">片假名</button>
      </div>
      <div class="kgrid" id="kov"></div>
    </div>
  </div>
</div>

<div id="study" class="screen hidden">
  <div class="nav">
    <div class="nav-logo">かな</div>
    <div class="nav-center">
      <div class="nav-pb"><div class="nav-pf" id="spf"></div></div>
      <div class="nav-pc" id="spc"></div>
    </div>
    <button class="nbtn" onclick="goHome()">主页</button>
  </div>
  <div class="study-body">
    <div class="kana-col">
      <div class="scard" id="scard">
        <div class="hbadge hl" id="hl">再学一遍</div>
        <div class="hbadge hr" id="hr">已掌握 ✓</div>
        <div class="ctype" id="ctype"></div>
        <div class="ckana" id="ckana"></div>
        <div class="croma" id="croma"></div>
        <button class="csound" onclick="playSound()">🔊</button>
        <div class="cexs" id="cexs"></div>
      </div>
    </div>
    <div class="panels-col">
      <div class="stroke-box" id="stroke-box">
        <div class="box-lbl">笔顺</div>
        <div class="stroke-wrap" id="stroke-wrap"></div>
      </div>
      <div class="write-box">
        <div class="box-lbl">描红</div>
        <canvas id="wc"></canvas>
        <button class="clr-btn" onclick="clearWrite()">清除</button>
      </div>
    </div>
  </div>
  <div class="act-row">
    <button class="abtn a-again" onclick="doSwipe('left')">← 再学一遍</button>
    <button class="abtn a-know" onclick="doSwipe('right')">已掌握 →</button>
  </div>
</div>

<div id="quiz" class="screen hidden">
  <div class="nav">
    <div class="nav-logo">かな</div>
    <div style="font-size:11px;color:var(--t2)">学习检验</div>
    <button class="nbtn" onclick="showComplete()">跳过</button>
  </div>
  <div class="qwrap fade-in">
    <div class="qhdr"><div class="qpb"><div class="qpf" id="qpf"></div></div><div class="qnum" id="qn"></div></div>
    <div id="qbody"></div>
  </div>
</div>

<div id="complete" class="screen hidden">
  <div class="ccard fade-in">
    <div class="cem">🎉</div>
    <h2>今日任务完成！</h2>
    <p id="cmsg"></p>
    <div class="cacc" id="csts"></div>
    <button class="btn btn-p" style="margin-bottom:7px" onclick="goHome()">回到主页</button>
    <button class="btn btn-s" onclick="startStudy()">继续学更多</button>
  </div>
</div>

<script>
// ── DATA ──
var H=[
  {k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'},
  {k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'},

  {k:'は',r:'ha'},{k:'ひ',r:'hi'},{k:'ふ',r:'fu'},{k:'へ',r:'he'},{k:'ほ',r:'ho'},
  {k:'ま',r:'ma'},{k:'み',r:'mi'},{k:'む',r:'mu'},{k:'め',r:'me'},{k:'も',r:'mo'},
  {k:'や',r:'ya'},{k:'ゆ',r:'yu'},{k:'よ',r:'yo'},
  {k:'ら',r:'ra'},{k:'り',r:'ri'},{k:'る',r:'ru'},{k:'れ',r:'re'},{k:'ろ',r:'ro'},
  {k:'わ',r:'wa'},{k:'を',r:'wo'},{k:'ん',r:'n'}
];
var K=[
  {k:'ア',r:'a'},{k:'イ',r:'i'},{k:'ウ',r:'u'},{k:'エ',r:'e'},{k:'オ',r:'o'},
  {k:'カ',r:'ka'},{k:'キ',r:'ki'},{k:'ク',r:'ku'},{k:'ケ',r:'ke'},{k:'コ',r:'ko'},
  {k:'サ',r:'sa'},{k:'シ',r:'shi'},{k:'ス',r:'su'},{k:'セ',r:'se'},{k:'ソ',r:'so'},
  {k:'タ',r:'ta'},{k:'チ',r:'chi'},{k:'ツ',r:'tsu'},{k:'テ',r:'te'},{k:'ト',r:'to'},

var SC=['#C8502A','#2A7AC8','#2A8A5A','#9B2AC8','#C88A2A'];

// ── STROKE SVG ──
// Build an SVG where:
//  - ghost = all paths drawn light gray (the "correct shape" to trace)
//  - animated = each path drawn in color via stroke-dashoffset
function buildSVG(kana){
  var paths=KVG[kana]||[];
  var NS='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 109 109');
  svg.style.cssText='width:100%;height:100%';

  // Ghost: all strokes as light gray guide
  paths.forEach(function(d){
    var p=document.createElementNS(NS,'path');
    p.setAttribute('d',d);p.setAttribute('fill','none');
    p.setAttribute('stroke','#C8C4BC');p.setAttribute('stroke-width','4.5');
    p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');
    svg.appendChild(p);
  });

  // Animated stroke paths + number dots
  paths.forEach(function(d,i){
    var p=document.createElementNS(NS,'path');
    p.setAttribute('d',d);p.setAttribute('fill','none');
    p.setAttribute('stroke',SC[i%SC.length]);p.setAttribute('stroke-width','4.5');
    p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');
    p.className.baseVal='apath';
    svg.appendChild(p);

    // Start dot
    var m=d.match(/M\s*([\d.,-]+),([\d.,-]+)/);
    if(m){
      var cx=parseFloat(m[1]),cy=parseFloat(m[2]);
      var c=document.createElementNS(NS,'circle');
      c.setAttribute('cx',cx);c.setAttribute('cy',cy);
      c.setAttribute('r','4');c.setAttribute('fill',SC[i%SC.length]);
      c.className.baseVal='adot';
      svg.appendChild(c);
      var t=document.createElementNS(NS,'text');
      t.setAttribute('x',cx);t.setAttribute('y',cy+0.5);
      t.setAttribute('font-size','5');t.setAttribute('font-weight','bold');
      t.setAttribute('fill','#fff');t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','middle');t.setAttribute('font-family','sans-serif');
      t.textContent=i+1;t.className.baseVal='adot';
      svg.appendChild(t);
    }
  });
  return svg;
}

var animId=null,animPaths=[],animDots=[],animStart=0;
var PMS=680,GAP=220,LOOP=900;

function startAnim(kana){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  var wrap=document.getElementById('stroke-wrap');
  wrap.innerHTML='';
  var svg=buildSVG(kana);
  wrap.appendChild(svg);

  animPaths=[]; animDots=[];
  var aps=svg.querySelectorAll('.apath');
  var ads=svg.querySelectorAll('.adot');
  aps.forEach(function(p){
    var L=0;try{L=p.getTotalLength();}catch(e){L=150;}
    p.style.strokeDasharray=L+'px';
    p.style.strokeDashoffset=L+'px';
    animPaths.push({el:p,L:L});
  });
  // group dots by stroke (2 elements per stroke: circle + text)
  for(var i=0;i<animPaths.length;i++){
    animDots.push([ads[i*2],ads[i*2+1]]);
    if(ads[i*2])ads[i*2].style.opacity='0';
    if(ads[i*2+1])ads[i*2+1].style.opacity='0';
  }

  animStart=performance.now();
  rafAnim(animStart);
}

function rafAnim(now){
  var elapsed=(now-animStart);
  var cycle=animPaths.length*(PMS+GAP)+LOOP;
  var t=elapsed%cycle;
  animPaths.forEach(function(ap,i){
    var s0=i*(PMS+GAP), s1=s0+PMS;
    var frac;
    if(t<s0)frac=0;
    else if(t<s1)frac=(t-s0)/PMS;
    else frac=1;
    ap.el.style.strokeDashoffset=(ap.L*(1-frac))+'px';
    var vis=frac>0?'1':'0';
    if(animDots[i]){
      if(animDots[i][0])animDots[i][0].style.opacity=vis;
      if(animDots[i][1])animDots[i][1].style.opacity=vis;
    }
  });
  animId=requestAnimationFrame(rafAnim);
}

var wCtx=null,wDraw=false,wLX=0,wLY=0;
function initWrite(){
  var c=document.getElementById('wc');
  var p=c.parentElement;
  c.width=p.clientWidth-2; c.height=p.clientHeight-30;
  if(c.width<20)c.width=80; if(c.height<20)c.height=80;
  wCtx=c.getContext('2d');
  wCtx.lineWidth=3.5;wCtx.lineCap='round';wCtx.lineJoin='round';wCtx.strokeStyle='#C0461E';
  c.onmousedown=function(e){wDraw=true;var p=wP(e,c);wLX=p[0];wLY=p[1]};
  c.ontouchstart=function(e){e.preventDefault();wDraw=true;var p=wP(e.touches[0],c);wLX=p[0];wLY=p[1]};
  c.ontouchmove=function(e){e.preventDefault();if(!wDraw)return;wLine(e.touches[0],c)};
  c.ontouchend=function(){wDraw=false};
}
window.addEventListener('mousemove',function(e){if(!wDraw)return;var c=document.getElementById('wc');if(wCtx)wLine(e,c)},{passive:true});
window.addEventListener('mouseup',function(){wDraw=false});
function wP(e,c){var r=c.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top]}
function wLine(e,c){var p=wP(e,c);wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(p[0],p[1]);wCtx.stroke();wLX=p[0];wLY=p[1]}
function clearWrite(){
  if(!wCtx||!curCard)return;
  var c=document.getElementById('wc');
  wCtx.clearRect(0,0,c.width,c.height);
  // Draw ghost kana from KVG paths scaled to canvas
  var paths=KVG[curCard.k]||[];
  if(!paths.length)return;
  var s=Math.min(c.width,c.height)/109*0.82;
  var ox=(c.width-109*s)/2, oy=(c.height-109*s)/2;
  wCtx.save();wCtx.translate(ox,oy);wCtx.scale(s,s);
  wCtx.strokeStyle='rgba(0,0,0,0.1)';wCtx.lineWidth=4.5/s;
  wCtx.lineCap='round';wCtx.lineJoin='round';
  paths.forEach(function(d){
    var path=new Path2D(d);
    wCtx.stroke(path);
  });
  wCtx.restore();
  wCtx.strokeStyle='#C0461E';wCtx.lineWidth=3.5;
}

function go(){
  var n=document.getElementById('name-inp').value.trim();
  if(!n){document.getElementById('sp-err').style.display='block';return}
  document.getElementById('sp-err').style.display='none';

    show('setup');
  } else {chkDay();showHome()}
  localStorage.setItem('kana_last',n);
}
function chkDay(){
  var td=new Date().toDateString();
  if(state.lastStudyDate&&state.lastStudyDate!==td){
    var diff=Math.round((new Date(td)-new Date(state.lastStudyDate))/86400000);
    if(diff===1)state.streak++;else if(diff>1)state.streak=0;
    state.weekData.push(state.todayStudied.length);
    if(state.weekData.length>7)state.weekData=state.weekData.slice(-7);
    state.todayStudied=[];state.lastStudyDate=td;save();
  }else if(!state.lastStudyDate)state.lastStudyDate=new Date().toDateString();
}
function togT(b,t){var i=sTypes.indexOf(t);if(i>-1){if(sTypes.length===1)return;sTypes.splice(i,1);b.classList.remove('on')}else{sTypes.push(t);b.classList.add('on')}}
function setN(b,n){sN=n;document.querySelectorAll('.chip.on2').forEach(function(x){x.classList.remove('on2')});b.classList.add('on2')}
function saveSetup(){state.settings={types:sTypes.slice(),dailyCount:sN};state.lastStudyDate=new Date().toDateString();save();showHome()}

function showHome(){
  show('home');
  document.getElementById('hname').textContent=state.name;
  var h=H.filter(function(k){return state.progress.hiragana&&state.progress.hiragana[k.r]==='known'}).length;
  var k=K.filter(function(k){return state.progress.katakana&&state.progress.katakana[k.r]==='known'}).length;
  document.getElementById('sttotal').textContent=h+k;
  document.getElementById('ststreak').textContent=state.streak;
  document.getElementById('ph').style.width=Math.round(h/46*100)+'%';
  document.getElementById('pk').style.width=Math.round(k/46*100)+'%';
  document.getElementById('phc').textContent=h+'/46';
  document.getElementById('pkc').textContent=k+'/46';
  var rem=Math.max(0,state.settings.dailyCount-state.todayStudied.length);
  document.getElementById('today-t').textContent=rem===0?'今日任务完成 🎉':'今日任务';
  document.getElementById('today-s').textContent=rem===0?'点击继续复习':'还剩 '+rem+' 个假名';
  renderWeek();renderOv(tabM);
}
function renderWeek(){
  var days=['一','二','三','四','五','六','日'];
  var max=Math.max.apply(null,state.weekData.concat([1]));
  document.getElementById('wchart').innerHTML=state.weekData.map(function(v,i){
    var h=Math.round(v/max*28);
    return '<div class="wbw"><div class="wb" style="height:'+h+'px"></div><div class="wd">'+days[i]+'</div></div>';
  }).join('');
}
function togTab(){switchTab(tabM==='h'?'k':'h')}
function switchTab(m){
  tabM=m;
  document.getElementById('th').classList.toggle('on',m==='h');
  document.getElementById('tk').classList.toggle('on',m==='k');
  renderOv(m);
}
function renderOv(m){
  var arr=m==='h'?H:K,pk=m==='h'?'hiragana':'katakana';
  document.getElementById('kov').innerHTML=arr.map(function(k){
    var st=state.progress[pk]&&state.progress[pk][k.r];
    var cls=st==='known'?'known':st?'learning':'unseen';
    return '<div class="kc '+cls+'">'+k.k+'<div class="r">'+k.r+'</div></div>';
  }).join('');
}
function goHome(){if(animId){cancelAnimationFrame(animId);animId=null}show('home');showHome()}
function resetUser(){localStorage.removeItem('kana_last');state={name:'',settings:{types:['hiragana','katakana'],dailyCount:10},progress:{hiragana:{},katakana:{}},todayStudied:[],streak:0,weekData:[0,0,0,0,0,0,0],lastStudyDate:null};document.getElementById('name-inp').value='';show('splash')}

// ── STUDY ──
function shuf(a){return a.slice().sort(function(){return Math.random()-.5})}
function buildQ(){
  var t=state.settings.types,all=[];
  if(t.indexOf('hiragana')>-1)all=all.concat(H.map(function(k){return Object.assign({},k,{type:'hiragana',tl:'平假名'})}));
  if(t.indexOf('katakana')>-1)all=all.concat(K.map(function(k){return Object.assign({},k,{type:'katakana',tl:'片假名'})}));
  var u=all.filter(function(k){return !state.progress[k.type]||!state.progress[k.type][k.r]});
  var l=all.filter(function(k){return state.progress[k.type]&&state.progress[k.type][k.r]==='learning'});
  return shuf(u).concat(shuf(l)).slice(0,state.settings.dailyCount);
}
function startStudy(){
  queue=buildQ();
  if(!queue.length){alert('所有假名已掌握！你太棒了！');return}
  qIdx=0;show('study');
  requestAnimationFrame(function(){
    setTimeout(function(){initWrite();showCard(queue[0])},30);
  });
}
function showCard(card){
  curCard=card;
  document.getElementById('ctype').textContent=card.tl;
  document.getElementById('ckana').textContent=card.k;
  document.getElementById('croma').textContent=card.r;
  document.getElementById('hl').style.opacity='0';
  document.getElementById('hr').style.opacity='0';
  var sc=document.getElementById('scard');
  sc.style.transform='';sc.style.opacity='1';sc.classList.remove('fly-l','fly-r');
  updProg();renderExs(card);
  startAnim(card.k);
  clearWrite();
  initSwipe();
  setTimeout(playSound,250);
}
function updProg(){
  var pct=queue.length?Math.round(qIdx/queue.length*100):0;
  document.getElementById('spf').style.width=pct+'%';
  document.getElementById('spc').textContent=qIdx+'/'+queue.length;
}
function renderExs(card){
  var ex=EX[card.r]||[];
  var el=document.getElementById('cexs');
  if(!ex.length){el.innerHTML='';return}
  el.innerHTML=ex.slice(0,2).map(function(e){
    var p=e.split('/');
    return '<div class="exi"><div class="exk">'+(p[0]||'')+'</div><div><span class="exr">'+(p[1]||'')+'</span> <span class="exm">'+(p[2]||'')+'</span></div></div>';
  }).join('');
}
function playSound(){
  if(!synth||!curCard)return;
  if(synth.speaking)synth.cancel();
  var u=new SpeechSynthesisUtterance(curCard.k);
  u.lang='ja-JP';u.rate=0.8;if(jpV)u.voice=jpV;synth.speak(u);
}
function initSwipe(){
  var c=document.getElementById('scard');
  c.onmousedown=function(e){if(e.target.closest('canvas')||e.target.tagName==='BUTTON')return;sDX=e.clientX;sDrag=true;c.style.transition='none'};
  document.onmousemove=function(e){if(!sDrag)return;dMove(e.clientX-sDX)};
  document.onmouseup=function(e){if(!sDrag)return;sDrag=false;c.style.transition='';dEnd(e.clientX-sDX)};
  c.ontouchstart=function(e){if(e.target.closest('canvas')||e.target.tagName==='BUTTON')return;sDX=e.touches[0].clientX;sDrag=true;c.style.transition='none'};
  c.ontouchmove=function(e){if(!sDrag)return;e.preventDefault();dMove(e.touches[0].clientX-sDX)};
  c.ontouchend=function(e){if(!sDrag)return;sDrag=false;c.style.transition='';dEnd(e.changedTouches[0].clientX-sDX)};
}
function dMove(dx){
  document.getElementById('scard').style.transform='translateX('+dx+'px) rotate('+(dx*.022)+'deg)';
  document.getElementById('hl').style.opacity=dx<-18?Math.min(1,(-dx-18)/45):'0';
  document.getElementById('hr').style.opacity=dx>18?Math.min(1,(dx-18)/45):'0';
}
function dEnd(dx){
  if(dx<-60)doSwipe('left');
  else if(dx>60)doSwipe('right');
  else{
    var c=document.getElementById('scard');
    c.style.transition='transform .2s';c.style.transform='';
    document.getElementById('hl').style.opacity='0';document.getElementById('hr').style.opacity='0';
    setTimeout(function(){c.style.transition=''},210);
  }
}
function doSwipe(dir){
  if(animId){cancelAnimationFrame(animId);animId=null}
  document.getElementById('scard').classList.add(dir==='left'?'fly-l':'fly-r');
  if(!state.progress[curCard.type])state.progress[curCard.type]={};
  var key=curCard.r+'_'+curCard.type;
  if(dir==='right'){
    state.progress[curCard.type][curCard.r]='known';
    if(state.todayStudied.indexOf(key)<0)state.todayStudied.push(key);
  } else {
    state.progress[curCard.type][curCard.r]='learning';
    queue.push(curCard);
  }
  if(!state.lastStudyDate)state.lastStudyDate=new Date().toDateString();
  save();
  setTimeout(function(){qIdx++;if(qIdx>=queue.length)startQuiz();else showCard(queue[qIdx])},300);
}

// ── QUIZ ──
function startQuiz(){
  var t=state.settings.types,all=[];
  if(t.indexOf('hiragana')>-1)all=all.concat(H.map(function(k){return Object.assign({},k,{type:'hiragana'})}));
  if(t.indexOf('katakana')>-1)all=all.concat(K.map(function(k){return Object.assign({},k,{type:'katakana'})}));
  var kn=all.filter(function(k){return state.progress[k.type]&&state.progress[k.type][k.r]==='known'});
  if(kn.length<4){showComplete();return}
  qzItems=shuf(kn).slice(0,Math.min(8,kn.length));qzIdx=0;qzScore=0;show('quiz');showQ();
}
function showQ(){
  if(qzIdx>=qzItems.length){showQR();return}
  var pct=Math.round(qzIdx/qzItems.length*100);
  document.getElementById('qpf').style.width=pct+'%';
  document.getElementById('qn').textContent=(qzIdx+1)+'/'+qzItems.length;
  var item=qzItems[qzIdx];
  var pool=shuf(H.concat(K).filter(function(k){return k.r!==item.r})).slice(0,3);
  var qt=qzIdx%3,body=document.getElementById('qbody');
  if(qt===0){
    var opts=shuf([item].concat(pool)).map(function(o){return '<button class="qopt" onclick="chkMC(this,\''+o.r+'\',\''+item.r+'\')">'+o.r+'</button>'}).join('');
    body.innerHTML='<div class="qq fade-in"><div class="qt">这个假名怎么读？</div><div class="qk">'+item.k+'</div></div><div class="qopts">'+opts+'</div>';
  } else if(qt===1){
    var o2=shuf([item].concat(pool)).map(function(o){return '<button class="qopt" style="font-size:26px" onclick="chkMC(this,\''+o.r+'\',\''+item.r+'\')">'+o.k+'</button>'}).join('');
    body.innerHTML='<div class="qq fade-in"><div class="qt">哪个是「'+item.r+'」？</div><div class="qk" style="font-size:26px;font-family:sans-serif">'+item.r+'</div></div><div class="qopts">'+o2+'</div>';
  } else {
    body.innerHTML='<div class="qq fade-in"><div class="qt">写出这个假名的读音</div><div class="qk">'+item.k+'</div></div><div style="padding:0 2px"><input class="finp" id="fi" placeholder="输入罗马字…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key===\'Enter\')chkF(\''+item.r+'\')"><button class="qnext" onclick="chkF(\''+item.r+'\')">确认</button></div>';
    setTimeout(function(){var f=document.getElementById('fi');if(f)f.focus()},70);
  }
}
function chkMC(b,ch,co){
  document.querySelectorAll('.qopt').forEach(function(x){x.onclick=null});
  if(ch===co){b.classList.add('correct');qzScore++}
  else{b.classList.add('wrong');document.querySelectorAll('.qopt').forEach(function(x){if(x.textContent.trim()===co)x.classList.add('show-ok')})}
  setTimeout(function(){qzIdx++;showQ()},860);
}
function chkF(co){
  var inp=document.getElementById('fi');inp.readOnly=true;
  if(inp.value.trim().toLowerCase()===co){inp.classList.add('correct');qzScore++}
  else{inp.classList.add('wrong');inp.value='✗ 正确：'+co}
  setTimeout(function(){qzIdx++;showQ()},1000);
}
function showQR(){
  var pct=Math.round(qzScore/qzItems.length*100);
  var em=pct>=80?'🌟':pct>=60?'👍':'💪',msg=pct>=80?'太棒了！':pct>=60?'继续加油！':'多练习！';
  document.getElementById('qbody').innerHTML='<div class="rbox fade-in"><div class="rem">'+em+'</div><div class="rtitle">'+msg+'</div><div class="rsub">今日测验完成</div><div class="rstats"><div class="rstat"><div class="n">'+qzScore+'</div><div class="l">答对</div></div><div class="rstat"><div class="n">'+(qzItems.length-qzScore)+'</div><div class="l">答错</div></div><div class="rstat"><div class="n">'+pct+'%</div><div class="l">正确率</div></div></div><button class="qnext" onclick="showComplete()">完成！</button></div>';
}
function showComplete(){
  show('complete');
  var t=state.settings.types,k=0;
  if(t.indexOf('hiragana')>-1)k+=H.filter(function(x){return state.progress.hiragana&&state.progress.hiragana[x.r]==='known'}).length;
  if(t.indexOf('katakana')>-1)k+=K.filter(function(x){return state.progress.katakana&&state.progress.katakana[x.r]==='known'}).length;
  document.getElementById('cmsg').textContent=state.name+'，你今天表现得很棒！';
  document.getElementById('csts').textContent='已掌握 '+k+' 个假名，继续加油！';
  var td=new Date().toDateString();
  if(state.lastStudyDate!==td){state.lastStudyDate=td;state.streak++}
  state.weekData[state.weekData.length-1]=state.todayStudied.length;
  save();
}
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.add('hidden')});document.getElementById(id).classList.remove('hidden')}
window.onload=function(){
  var last=localStorage.getItem('kana_last');
  if(last&&load(last)&&state.name){document.getElementById('name-inp').value=state.name;chkDay();showHome();return}
  show('splash');
  setTimeout(function(){document.getElementById('name-inp').focus()},150);
};
</script>
</body>
